# Docker Compose for Local Development
# Issue #607 - Local Development Environment with PostgreSQL and Hot Reload
#
# ⚠️  SECURITY WARNING ⚠️
# This configuration uses default credentials (postgres:postgres) and is
# intended ONLY for local development. NEVER use these credentials or
# expose this configuration in production environments.
#
# Usage:
#   bun run db:up        # Start PostgreSQL only
#   bun run dev:docker   # Start both app and database with hot reload
#   bun run db:reset     # Reset database (destroys all data)
#   bun run db:studio    # Open Drizzle Studio to inspect database
#
# This configuration provides:
# - PostgreSQL 16 with pgvector (matching Aurora, which bundles pgvector)
# - Volume-mounted source code for hot reload
# - Automatic migration execution on database startup
# - Persistent database data between restarts

services:
  # PostgreSQL Database (matches Aurora PostgreSQL 16 + pgvector).
  # pgvector/pgvector:pg16 replaced postgres:16-alpine for Issue #1252 —
  # migration 115 needs the `vector` type (embedding column + HNSW index),
  # which the plain alpine image cannot provide.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aistudio-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aistudio
    volumes:
      # Persistent data storage. Named postgres_data_pgvector (not the old
      # postgres_data) so the pre-pgvector alpine volume is left intact and the
      # debian-based image initializes fresh — an alpine(musl) data dir must
      # not be reused under glibc collations.
      - postgres_data_pgvector:/var/lib/postgresql/data
      # Initialize database with schema on first run
      - ./scripts/db/init-local.sh:/docker-entrypoint-initdb.d/01-init-local.sh:ro
      - ./infra/database/schema:/docker-entrypoint-initdb.d/schema:ro
      # Migration manifest (single source of truth)
      - ./infra/database/migrations.json:/docker-entrypoint-initdb.d/migrations.json:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aistudio"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Next.js Application with Hot Reload
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aistudio-app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      # Docker-specific overrides (these take precedence over .env.local)
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0

      # Database - override to use Docker network hostname
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aistudio
      DB_SSL: "false"

      # Next.js hot reload configuration
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"

      # Auth URL must be localhost for browser redirects
      AUTH_URL: http://localhost:3000

      # All other env vars (Cognito, AI providers, AWS) come from .env.local

    volumes:
      # Mount source code for hot reload
      - .:/app
      # Preserve node_modules (don't overwrite with host)
      - /app/node_modules
      # Preserve .next cache for faster rebuilds
      - /app/.next
      # Mount AWS credentials for S3 access (read-only)
      - ~/.aws:/root/.aws:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Enable init process for proper signal handling
    init: true

volumes:
  postgres_data_pgvector:
    driver: local

networks:
  default:
    name: aistudio-dev-network
