  /content/export/okf:
    post:
      operationId: exportOkf
      tags: [Content]
      summary: Export a collection as an OKF bundle
      description: |
        Serializes a `content_collections` subtree to a portable **Open Knowledge
        Format (OKF v0.1)** bundle: one markdown-with-YAML-frontmatter concept file
        per content object, an `index.md` per collection, and a `log.md` change
        history (spec §36). Mirrors the MCP `export_okf` tool. Requires
        `content:read`.

        **Permission-at-export (the security-critical surface):** every object is
        filtered by the caller's view permission (`visibilityService.canView`,
        pushed into SQL) — a bundle requested by a student identity contains no
        staff-only concept.

        **Public bundles (§26.4 gate):** `audience: "public"` produces an
        anonymous-safe bundle (only `visibility_level = 'public'` objects) and
        requires `content:publish_public`. Without it — including for EVERY
        autonomous agent — this returns **HTTP 202** with
        `data.status = "approval_required"` and the request enters the review queue.

        The bundle is returned inline (`data.files`) and also persisted to S3; a
        presigned `data.location` URL points at the stored JSON.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OkfExportRequest"
      responses:
        "200":
          description: The OKF bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkfExportResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "202":
          description: |
            Approval required — a public bundle was requested without
            `content:publish_public`. The request is queued for human review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentApprovalRequiredResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/import/okf:
    post:
      operationId: importOkf
      tags: [Content]
      summary: Import an OKF bundle into content
      description: |
        Imports an OKF bundle (the `{ files: [{ path, content }] }` shape
        `export_okf` returns) into Atrium content (spec §36.3). Reconstructs the
        collection tree from the bundle directories and creates one content object
        per concept file. Mirrors the MCP `import_okf` tool. Requires
        `content:create`.

        **Provenance:** imported objects are **agent-authored**
        (`actor_kind = 'agent'`, attributed to the seeded `atrium-importer`
        identity) and created **private + draft** — never fabricated human
        authorship, never pre-widened. The triggering caller is recorded in the
        audit trail.

        **Retry semantics:** import is additive and NOT transactional. A run that
        fails partway leaves the already-created private/draft content in place, and
        a retry re-imports the whole bundle as new objects (no dedup). For
        idempotency, import into a fresh `targetCollectionId` and delete that partial
        collection before retrying.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OkfImportRequest"
      responses:
        "201":
          description: Imported objects + reconstructed collections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkfImportResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /agents/delegated-token:
    post:
      operationId: mintDelegatedToken
      tags: [Agents]
      summary: Mint a short-lived delegated content token
      description: |
        Exchanges an autonomous agent's OAuth client-credentials JWT for a
        **short-lived (300 s) delegated token** acting on behalf of a named
        human user (Atrium §26.1, Epic #1059). Requires the agent-held
        `content:delegate` scope, AND the caller must be an **OIDC agent
        bearer** (a client-credentials JWT whose client id maps to an ACTIVE
        agent identity). A session or `sk-` API key cannot mint even if it
        holds the scope, and a delegated token cannot re-mint (both `403
        FORBIDDEN`).

        **Scope bounding:** minted scope = requested ∩ the agent's content
        scopes ∩ the acting-for user's role-derived content scopes. The result
        never includes `content:delegate`, and includes
        `content:publish_public` only when the user is an administrator AND
        the agent holds it. An empty intersection is `403 INSUFFICIENT_SCOPE`
        — no token is minted.

        **Claims:** the token's `sub` is the low-privilege SYSTEM user
        (§26.5), not the human; the human is named by the numeric
        `delegated_for` claim, which only the content surface consumes. Use
        the returned `access_token` as the Bearer token on
        `/api/v1/content/*`.

        **Stateless:** the token is signed by the platform OIDC signer and is
        NOT persisted — it cannot be revoked before expiry; the 300-second TTL
        is the mitigation.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DelegatedTokenRequest"
      responses:
        "200":
          description: The delegated token (never persisted; expires in 300 s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegatedTokenResponse"
              example:
                data:
                  access_token: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
                  token_type: Bearer
                  expires_in: 300
                  scope: "content:create content:read"
                  delegated_for: 42
                meta:
                  requestId: req_abc123
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Not mintable — the caller lacks `content:delegate`
            (`INSUFFICIENT_SCOPE`), is not an OIDC token backed by an active
            agent identity or is itself a delegated token (`FORBIDDEN`), or
            the requested ∩ agent ∩ user scope intersection is empty
            (`INSUFFICIENT_SCOPE`). An UNKNOWN `delegated_for` user also
            returns `INSUFFICIENT_SCOPE` (an unknown user has no grantable
            scopes) rather than a distinct 404 — the two are deliberately
            indistinguishable so a delegation-capable agent cannot enumerate
            which user ids exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notAnAgent:
                  summary: Session or sk- API key caller (not an OIDC agent identity)
                  value:
                    error:
                      code: FORBIDDEN
                      message: Delegated tokens can only be minted by an OIDC agent identity
                    requestId: req_abc123
                alreadyDelegated:
                  summary: A delegated token cannot re-mint
                  value:
                    error:
                      code: FORBIDDEN
                      message: A delegated token cannot mint further delegated tokens
                    requestId: req_abc123
                emptyIntersection:
                  summary: No grantable scopes for this agent + user combination
                  value:
                    error:
                      code: INSUFFICIENT_SCOPE
                      message: No content scopes are grantable for this agent + user combination
                    requestId: req_abc123
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          description: |
            `CONFIGURATION_ERROR` when `ATRIUM_SYSTEM_USER_ID` is not
            configured (delegated minting is disabled); otherwise an
            unexpected server error (`INTERNAL_ERROR`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: CONFIGURATION_ERROR
                  message: Delegated token minting is not configured
                requestId: req_abc123
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"

# ============================================
# Components
# ============================================

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "API key token (prefix: `sk-`) or OIDC bearer JWT (agent client-credentials / delegated)"
    SessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: Browser session cookie (NextAuth)

  # ---- Parameters ----
  parameters:
    nodeIdPath:
      name: nodeId
      in: path
      required: true
      description: Node UUID
      schema:
        type: string
        format: uuid

    nodeTypeFilter:
      name: nodeType
      in: query
      description: Filter by node type (exact match)
      schema:
        type: string
        maxLength: 100

    nodeClassFilter:
      name: nodeClass
      in: query
      description: Filter by node class (exact match)
      schema:
        type: string
        maxLength: 100

    statusFilter:
      name: status
      in: query
      description: >
        Filter by decision lifecycle status (Issue #1252). Combine with
        `nodeType=decision` and `status=accepted` to return only current
        (non-superseded) decisions — the "what is the current decision on X"
        query. Nodes with a NULL status (all non-decision nodes) are excluded.
      schema:
        type: string
        enum: [proposed, accepted, superseded, rejected]

    searchFilter:
      name: search
      in: query
      description: Case-insensitive lexical (ILIKE) search across name and description
      schema:
        type: string
        minLength: 1
        maxLength: 100

    semanticQueryFilter:
      name: q
      in: query
      description: >
        Semantic (embedding-based) search — returns paraphrase matches ranked by
        cosine similarity (Issue #1252). Combine with `nodeType` to scope. Falls
        back to lexical search on the same text if embeddings are unavailable.
      schema:
        type: string
        minLength: 1
        maxLength: 500

    packageDepthParam:
      name: depth
      in: query
      description: "Decision-package graph-expansion radius in hops (default: 2, max: 3)"
      schema:
        type: integer
        minimum: 1
        maximum: 3
        default: 2

    limitParam:
      name: limit
      in: query
      description: "Maximum items per page (default: 50, max: 100)"
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    cursorParam:
      name: cursor
      in: query
      description: Opaque pagination cursor from a previous response's `meta.nextCursor`
      schema:
        type: string

    contentIdPath:
      name: id
      in: path
      required: true
      description: Content object UUID
      schema:
        type: string
        format: uuid

    publishDestinationPath:
      name: destination
      in: path
      required: true
      description: |
        Destination to unpublish from. No `okf`: an okf publication is a
        serialized S3 bundle with no live surface to take down (the route
        rejects it with 400).
      schema:
        type: string
        enum: [intranet, public_web, schoology, google]

    idempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Opaque 1-255 character visible-ASCII key. The server scopes it to the
        deployment environment, authenticated principal, OAuth/API client,
        method, and canonical route for seven days. Repeating the same request
        replays the original response; reusing it for different input returns
        `409 IDEMPOTENCY_KEY_REUSED`.
      schema:
        type: string
        minLength: 1
        maxLength: 255

    contentIfMatchHeader:
      name: If-Match
      in: header
      required: false
      description: |
        Optimistic concurrency precondition for version creation. Supply the
        strong ETag returned by `GET /content/{id}` or `"none"` when the object
        must not yet have a version. A stale value returns
        `412 VERSION_PRECONDITION_FAILED` before content screening or mutation.
      schema:
        type: string
        example: '"11111111-2222-4333-8444-555555555555"'

  # ---- Headers ----
  headers:
    X-Request-Id:
      description: Unique request identifier for tracing
      schema:
        type: string
        example: req_abc123def456
    X-RateLimit-Limit:
      description: Maximum requests allowed per 1-minute window
      schema:
        type: integer
        example: 60
    X-RateLimit-Remaining:
      description: Requests remaining in current window
      schema:
        type: integer
        example: 57
    X-RateLimit-Reset:
      description: Unix timestamp (seconds) when the rate limit window resets
      schema:
        type: integer
        example: 1706832060
    ContentHeadETag:
      description: Strong ETag containing the current content version id, or `"none"`.
      schema:
        type: string
        example: '"11111111-2222-4333-8444-555555555555"'
    Idempotency-Replayed:
      description: Present and `true` when a stored mutation response was replayed.
      schema:
        type: string
        enum: ["true"]

  # ---- Schemas ----
  schemas:
    # -- Assistants --
    AssistantListItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, pending_approval, approved, rejected, disabled]
        inputFieldCount:
          type: integer
        promptCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AssistantDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        timeoutSeconds:
          type: integer
          nullable: true
        inputFields:
          type: array
          items:
            $ref: "#/components/schemas/AssistantInputField"
        promptCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AssistantInputField:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        label:
          type: string
        fieldType:
          type: string
          enum: [short_text, long_text, select, multi_select, file_upload]
        position:
          type: integer
        options:
          type: object
          nullable: true

    ConversationSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        provider:
          type: string
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
          nullable: true
        parts:
          type: array
          items:
            type: object
        createdAt:
          type: string
          format: date-time

    # -- Jobs --
    JobStatus:
      type: object
      properties:
        data:
          type: object
          properties:
            jobId:
              type: string
              format: uuid
            status:
              type: string
              enum: [pending, processing, streaming, completed, failed, cancelled]
            createdAt:
              type: string
              format: date-time
            completedAt:
              type: string
              format: date-time
              nullable: true
            partialContent:
              type: string
            responseData:
              type: object
              nullable: true
              description: Final response (only when status is completed)
            errorMessage:
              type: string
              nullable: true
              description: Error details (only when status is failed)
            pollingInterval:
              type: integer
              description: Recommended polling interval in milliseconds
            shouldContinuePolling:
              type: boolean
        meta:
          type: object
          properties:
            requestId:
              type: string

    # -- Health --
    HealthResponse:
      type: object
      required: [status, version, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
          example: v1
        timestamp:
          type: string
          format: date-time

    # -- Node --
    GraphNode:
      type: object
      required: [id, nodeType, nodeClass, name, metadata, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        nodeType:
          type: string
          description: "Category of the node (e.g. `decision`, `person`, `document`)"
        nodeClass:
          type: string
          description: "Sub-classification (e.g. `policy`, `budget`, `hiring`)"
        name:
          type: string
        description:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          description: >
            Arbitrary key-value metadata. Agent-authored captures include a typed
            `provenance` block (`extractionMethod`, `sourceRef`, `confidence`);
            auto-reused nodes include `dedup` (`matchedNodeId`, `similarity`).
        status:
          type: string
          nullable: true
          enum: [proposed, accepted, superseded, rejected]
          description: >
            Decision lifecycle status (Issue #1252). Set on `decision` nodes only;
            null for other node types.
        supersededAt:
          type: string
          format: date-time
          nullable: true
          description: Set when a newer decision supersedes this one (Issue #1252)
        createdBy:
          type: integer
          nullable: true
          description: User ID of the creator
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateNodeRequest:
      type: object
      required: [name, nodeType, nodeClass]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 500
        nodeType:
          type: string
          minLength: 1
          maxLength: 100
        nodeClass:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 5000
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    UpdateNodeRequest:
      type: object
      description: At least one field must be provided.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 500
        nodeType:
          type: string
          minLength: 1
          maxLength: 100
        nodeClass:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 5000
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    # -- Edge --
    GraphEdge:
      type: object
      required: [id, sourceNodeId, targetNodeId, edgeType, metadata, createdAt]
      properties:
        id:
          type: string
          format: uuid
        sourceNodeId:
          type: string
          format: uuid
        targetNodeId:
          type: string
          format: uuid
        edgeType:
          type: string
          description: "Relationship type (e.g. `informed_by`, `related_to`)"
        metadata:
          type: object
          additionalProperties: true
        createdBy:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateEdgeRequest:
      type: object
      required: [sourceNodeId, targetNodeId, edgeType]
      properties:
        sourceNodeId:
          type: string
          format: uuid
        targetNodeId:
          type: string
          format: uuid
          description: Must differ from sourceNodeId
        edgeType:
          type: string
          minLength: 1
          maxLength: 100
        metadata:
          type: object
          additionalProperties: true

    # -- Decision --
    CreateDecisionRequest:
      type: object
      required: [decision, decidedBy]
      properties:
        decision:
          type: string
          minLength: 1
          maxLength: 2000
          description: What was decided
        decidedBy:
          type: string
          minLength: 1
          maxLength: 500
          description: Who proposed or made the decision
        reasoning:
          type: string
          maxLength: 5000
          description: Rationale behind the decision
        evidence:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 2000
          description: Data or observations that informed the decision
        constraints:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 2000
          description: Limiting factors (budget, timeline, policy, etc.)
        conditions:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 2000
          description: Future triggers that would cause revisiting
        alternatives_considered:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 2000
          description: Rejected alternatives
        consulted:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 500
          description: >-
            DACI parties consulted about the decision (Issue #1252). Each becomes
            a person node linked via a `CONSULTED` edge.
        notified:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 500
          description: >-
            DACI parties notified/informed of the decision (Issue #1252). Each
            becomes a person node linked via a `NOTIFIED` edge.
        supersedes:
          type: array
          maxItems: 20
          items:
            type: string
            format: uuid
          description: >-
            Existing decision node IDs this decision supersedes (Issue #1252).
            Each is marked `status=superseded` (+ `supersededAt`) and linked
            `SUPERSEDED_BY` (old → new). De-duplicated case-insensitively.
        relatedTo:
          type: array
          maxItems: 50
          items:
            type: string
            format: uuid
          description: >-
            Existing node IDs to link via CONTEXT edges. De-duplicated
            case-insensitively before edges are created; every ID must reference
            an existing node or the request fails with a 400.
        agentId:
          type: string
          maxLength: 200
          description: External agent identifier (sets source to "agent")
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key-value pairs attached to the decision node

    DecisionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [decisionNodeId, nodesCreated, edgesCreated, completenessScore, completenessMethod]
          properties:
            decisionNodeId:
              type: string
              format: uuid
              description: UUID of the primary decision node
            nodesCreated:
              type: integer
              description: Total number of nodes created
            edgesCreated:
              type: integer
              description: Total number of edges created
            completenessScore:
              type: integer
              minimum: 0
              maximum: 100
              description: "Deterministic rule-based completeness score (0-100), 25 points per criterion: decision node, person, evidence/constraint, condition. The optional LLM pass never changes this number."
            completenessMethod:
              type: string
              enum: [rule-based, llm-enhanced]
              description: >-
                "llm-enhanced" when the optional LLM pass ran and may have
                appended advisory warnings; "rule-based" when it was
                unavailable or failed. The score is rule-based either way.
            warnings:
              type: array
              items:
                type: string
              description: Completeness warnings (missing elements, plus LLM advisory insights when completenessMethod is "llm-enhanced"). Omitted when empty.
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    # -- Connection --
    NodeConnection:
      type: object
      required: [edge, connectedNode, direction]
      properties:
        edge:
          $ref: "#/components/schemas/GraphEdge"
        connectedNode:
          type: object
          required: [id, name, nodeType, nodeClass]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            nodeType:
              type: string
            nodeClass:
              type: string
        direction:
          type: string
          enum: [outgoing, incoming]

    # -- Response Wrappers --
    NodeListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        meta:
          type: object
          required: [requestId, limit, nextCursor]
          properties:
            requestId:
              type: string
            limit:
              type: integer
            nextCursor:
              type: string
              nullable: true

    NodeSingleResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/GraphNode"
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    EdgeListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"
        meta:
          type: object
          required: [requestId, limit, nextCursor]
          properties:
            requestId:
              type: string
            limit:
              type: integer
            nextCursor:
              type: string
              nullable: true

    EdgeSingleResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/GraphEdge"
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ConnectionListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NodeConnection"
        meta:
          type: object
          required: [requestId, total]
          properties:
            requestId:
              type: string
            total:
              type: integer

    # -- Decision package (Issue #1252) --
    SupersessionLink:
      type: object
      required: [supersededId, supersededById]
      properties:
        supersededId:
          type: string
          format: uuid
          description: The decision that was superseded
        supersededById:
          type: string
          format: uuid
          description: The decision that superseded it

    DecisionPackage:
      type: object
      required:
        [decision, nodes, edges, persons, evidence, constraints, reasoning, conditions, outcomes, policies, supersessionChain, depth]
      properties:
        decision:
          $ref: "#/components/schemas/GraphNode"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
          description: Every node reachable within the depth bound (including the seed)
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"
          description: Edges whose endpoints are both inside the package
        persons:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        constraints:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        reasoning:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        outcomes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        policies:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        supersessionChain:
          type: array
          items:
            $ref: "#/components/schemas/SupersessionLink"
        depth:
          type: integer
          description: The depth bound actually used (1-3)

    DecisionPackageResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/DecisionPackage"
        meta:
          type: object
          required: [requestId, depth]
          properties:
            requestId:
              type: string
            depth:
              type: integer

    DeleteResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [deletedId]
          properties:
            deletedId:
              type: string
              format: uuid
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    # -- Atrium Content (Issue #1055, Phase 5) --
    ContentVisibility:
      type: object
      required: [level]
      description: |
        Visibility level plus optional group grants. `grants` is only meaningful
        when `level` is `group`; each grant widens visibility along one dimension.
      properties:
        level:
          type: string
          enum: [private, group, internal, public]
        grants:
          type: array
          items:
            $ref: "#/components/schemas/VisibilityGrant"

    VisibilityGrant:
      type: object
      required: [kind, value]
      properties:
        kind:
          type: string
          enum: [role, building, department, grade, user, group]
        value:
          type: string

    CollectionDiscoveryNode:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - slug
        - parentId
        - path
        - defaultVisibilityLevel
        - visibleObjectCount
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        path:
          type: array
          minItems: 1
          items:
            type: string
        defaultVisibilityLevel:
          type: string
          enum: [private, group, internal, public]
        visibleObjectCount:
          type: integer
          minimum: 0
          description: Objects in this collection visible to this requester.
        selectableForCreate:
          type: boolean
          description: Present when the token also holds `content:create`.
        children:
          type: array
          description: Present for `shape=tree`; omitted for `shape=flat`.
          items:
            $ref: "#/components/schemas/CollectionDiscoveryNode"

    CollectionDiscoveryResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CollectionDiscoveryNode"
        meta:
          type: object
          required: [requestId, shape, count]
          properties:
            requestId:
              type: string
            shape:
              type: string
              enum: [tree, flat]
            count:
              type: integer
              minimum: 0

    ContentObject:
      type: object
      description: A serialized Atrium content object (timestamps are ISO-8601 strings).
      required:
        - id
        - kind
        - title
        - slug
        - ownerUserId
        - createdByActor
        - collectionId
        - visibilityLevel
        - currentVersionId
        - tags
        - status
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [document, artifact]
        title:
          type: string
        slug:
          type: string
        ownerUserId:
          type: integer
        createdByActor:
          type: string
          enum: [human, agent]
        createdByAgentId:
          type: string
          nullable: true
        collectionId:
          type: string
          format: uuid
          nullable: true
        visibilityLevel:
          type: string
          enum: [private, group, internal, public]
        currentVersionId:
          type: string
          format: uuid
          nullable: true
        sourceRef:
          oneOf:
            - $ref: "#/components/schemas/ContentSourceRef"
            - type: "null"
          description: Typed, create-only provenance reference.
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, published, archived]
        indexedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    ContentSourceRef:
      oneOf:
        - $ref: "#/components/schemas/CaptureSourceRef"
        - type: object
          additionalProperties: false
          required: [type, uploadId, filename]
          properties:
            type: { type: string, enum: [upload] }
            uploadId: { type: string, maxLength: 200 }
            filename: { type: string, maxLength: 500 }
        - type: object
          additionalProperties: false
          required: [type, objectId]
          properties:
            type: { type: string, enum: [object] }
            objectId: { type: string, format: uuid }
        - type: object
          additionalProperties: false
          required: [type, conversationId]
          properties:
            type: { type: string, enum: [chat] }
            conversationId: { type: string, format: uuid }
        - type: object
          additionalProperties: false
          required: [type, generator]
          properties:
            type: { type: string, enum: [okf] }
            generator: { type: string, maxLength: 200 }
        - type: object
          additionalProperties: false
          required: [type]
          properties:
            type: { type: string, enum: [none] }
      discriminator:
        propertyName: type

    CaptureSourceRef:
      type: object
      additionalProperties: false
      required:
        [type, provider, externalId, clientSurface, clientVersion, capturedAt]
      description: |
        Safe content-level provenance supplied by Atrium Capture. `sourceOrigins`
        is optional and policy-controlled; each entry is normalized to its
        HTTP(S) origin, so paths, queries, fragments, and credentials are never
        retained. The reference is immutable after create.
      properties:
        type: { type: string, enum: [capture] }
        provider:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
        externalId:
          type: string
          minLength: 1
          maxLength: 200
          pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
        clientSurface:
          type: string
          enum: [browser, mac]
        clientVersion:
          type: string
          minLength: 1
          maxLength: 64
        capturedAt:
          type: string
          format: date-time
        sourceOrigins:
          type: array
          maxItems: 20
          uniqueItems: true
          items:
            type: string
            format: uri

    ContentVersion:
      type: object
      description: A serialized content version.
      required:
        - id
        - objectId
        - versionNumber
        - authorActor
        - bodyFormat
        - bodyLocation
      properties:
        id:
          type: string
          format: uuid
        objectId:
          type: string
          format: uuid
        versionNumber:
          type: integer
        authorActor:
          type: string
          enum: [human, agent]
        authorUserId:
          type: integer
          nullable: true
        authorAgentId:
          type: string
          nullable: true
        bodyFormat:
          type: string
          enum: [markdown, html, jsx]
        bodyLocation:
          type: string
          description: Storage pointer (e.g. S3 key) for the version body.
        bodyInline:
          type: string
          nullable: true
          description: |
            Raw inline body for small artifacts. SECURITY: untrusted code — only
            render in a code editor or the cross-origin sandboxed iframe, never via
            `dangerouslySetInnerHTML`.
        renderLocation:
          type: string
          nullable: true
        proofDocRef:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true

    ContentObjectWithVersion:
      description: |
        A content object joined with its current version. The internal reader deep
        link (`url`, `/c/{slug}`) is present on create and get responses; it is
        omitted on the create-version response.
      allOf:
        - $ref: "#/components/schemas/ContentObject"
        - type: object
          properties:
            version:
              oneOf:
                - $ref: "#/components/schemas/ContentVersion"
                - type: "null"
              description: Current version, or null when the object has no version yet.
            url:
              type: string
              description: Internal reader deep link (`/c/{slug}`).

    CreateContentRequest:
      type: object
      required: [kind, title]
      properties:
        kind:
          type: string
          enum: [document, artifact]
        title:
          type: string
          minLength: 1
          maxLength: 500
        collectionId:
          type: string
          minLength: 1
          description: Collection slug or UUID; resolved to a collection id server-side.
        body:
          type: string
          description: >-
            Initial body (markdown for a document, code for an artifact). When
            omitted, no v1 is created. If `codeEncoding` is `base64`, this field
            is the base64-encoded body and is decoded server-side before
            screening and size caps.
        bodyFormat:
          type: string
          enum: [markdown, html, jsx]
        codeEncoding:
          type: string
          enum: [base64]
          description: >-
            Transit encoding for `body`. Set `base64` when the body contains
            HTML/JS/CSS (e.g. `<script>`, `<style>`, `style="…"`): the edge WAF
            blocks that markup in a raw request body, so send the body
            base64-encoded and the server decodes it BEFORE §28.3 screening and
            the decoded-size cap (max 5,000,000 decoded bytes). Invalid base64 →
            400. Omit for plain text/markdown (raw body, unchanged behavior).
        visibility:
          $ref: "#/components/schemas/ContentVisibility"
        tags:
          type: array
          items:
            type: string
        sourceRef:
          $ref: "#/components/schemas/ContentSourceRef"

    UpdateContentRequest:
      type: object
      description: Metadata-only patch. Body changes go through the versions endpoint.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Replaces all tags; `null` clears them.
        collectionId:
          type: string
          nullable: true
          description: Collection slug or UUID; `null` clears the collection.
        status:
          type: string
          enum: [draft, published, archived]

    CreateVersionRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          description: >-
            New body. If `codeEncoding` is `base64`, this is the base64-encoded
            body, decoded server-side before screening and the size cap.
        bodyFormat:
          type: string
          enum: [markdown, html, jsx]
        codeEncoding:
          type: string
          enum: [base64]
          description: >-
            Transit encoding for `body`. Set `base64` when the body contains
            HTML/JS/CSS (`<script>`, `<style>`, `style="…"`) so it is opaque to
            the edge WAF; the server decodes it BEFORE §28.3 screening and the
            decoded-size cap (max 5,000,000 decoded bytes). Invalid base64 → 400.
            Omit for plain text/markdown.
        summary:
          type: string
          maxLength: 2000

    PublishContentRequest:
      type: object
      required: [destination]
      properties:
        destination:
          type: string
          enum: [intranet, public_web, schoology, google, okf]
        visibility:
          $ref: "#/components/schemas/ContentVisibility"

    ContentListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContentObject"
        meta:
          type: object
          required: [requestId, count]
          properties:
            requestId:
              type: string
            count:
              type: integer

    ContentObjectResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ContentObjectWithVersion"
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentMetadataResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ContentObject"
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentVersionListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContentVersion"
        meta:
          type: object
          required: [requestId, count]
          properties:
            requestId:
              type: string
            count:
              type: integer

    ContentSource:
      type: object
      additionalProperties: false
      required:
        [objectId, versionId, versionNumber, bodyFormat, body, sha256]
      properties:
        objectId:
          type: string
          format: uuid
        versionId:
          type: string
          format: uuid
        versionNumber:
          type: integer
          minimum: 1
        bodyFormat:
          type: string
          enum: [markdown, html, jsx]
        body:
          type: string
          description: |
            Exact committed UTF-8 source. Storage is uncompressed; no
            content-encoding transformation is applied. The decoded body is
            bounded to 5,000,000 bytes.
        sha256:
          type: string
          description: Base64url-encoded SHA-256 of the UTF-8 body.

    ContentSourceResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ContentSource"
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentVisibilityResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [id, visibility]
          properties:
            id:
              type: string
              format: uuid
            visibility:
              type: object
              required: [visibilityLevel]
              properties:
                visibilityLevel:
                  type: string
                  enum: [private, group, internal, public]
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentPublishResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [id, destination, publishedVersionId]
          properties:
            id:
              type: string
              format: uuid
            destination:
              type: string
              enum: [intranet, public_web, schoology, google, okf]
            publishedVersionId:
              type: string
              format: uuid
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentApprovalRequiredResponse:
      type: object
      description: |
        Returned with HTTP 202 when a public-facing publish is requested by a
        caller lacking `content:publish_public` (the §26.4 approval gate). The
        request is queued for human review rather than published.
      required: [data, meta]
      properties:
        data:
          type: object
          required: [status, message]
          properties:
            status:
              type: string
              enum: [approval_required]
            message:
              type: string
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentUnpublishResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [id, destination, unpublished]
          properties:
            id:
              type: string
              format: uuid
            destination:
              type: string
              enum: [intranet, public_web, schoology, google, okf]
            unpublished:
              type: boolean
              description: "`false` when the object was not live at the destination (idempotent no-op); `true` when an active publication was removed."
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    # -- OKF interoperability (Phase 8, Issue #1103, §36) --
    OkfFile:
      type: object
      description: One file in an OKF bundle — an OKF-relative path + its markdown content.
      required: [path, content]
      properties:
        path:
          type: string
          description: POSIX-relative path within the bundle (e.g. `sub/concept-slug.md`).
          example: "mathematics/fractions.md"
        content:
          type: string
          description: The file's markdown content (concept frontmatter+body, or a reserved `index.md`/`log.md`).

    OkfExportRequest:
      type: object
      required: [collectionId]
      properties:
        collectionId:
          type: string
          description: Root collection slug or id to export.
        audience:
          type: string
          enum: [internal, public]
          default: internal
          description: |
            `internal` (default) scopes the bundle to what the caller can view.
            `public` produces an anonymous-safe bundle (only `visibility_level =
            'public'` objects) and requires `content:publish_public` (§26.4).

    OkfExportResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [okfVersion, files, objectCount, collectionCount]
          properties:
            okfVersion:
              type: string
              example: "0.1"
            generator:
              type: string
              example: "psd-aistudio-atrium/okf-exporter@0.1"
            rootCollectionId:
              type: string
              format: uuid
              nullable: true
            audience:
              type: string
              enum: [internal, public]
            objectCount:
              type: integer
            collectionCount:
              type: integer
            files:
              type: array
              items:
                $ref: "#/components/schemas/OkfFile"
            location:
              type: string
              nullable: true
              description: Presigned URL of the persisted bundle JSON in S3 (null when persistence failed).
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    OkfImportRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          minItems: 1
          maxItems: 1000
          description: "Bundle files. Request-size safety bounds: at most 1000 files, each `path` ≤ 1024 chars and `content` ≤ 5,000,000 chars (oversize → 400)."
          items:
            $ref: "#/components/schemas/OkfFile"
        targetCollectionId:
          type: string
          description: Existing collection slug or id to import the bundle root INTO (a fresh root collection is created when omitted).

    OkfImportResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [collectionsCreated, objectCount, objects]
          properties:
            rootCollectionId:
              type: string
              format: uuid
              nullable: true
            collectionsCreated:
              type: integer
            objectCount:
              type: integer
            objects:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  slug:
                    type: string
                  title:
                    type: string
                  collectionId:
                    type: string
                    format: uuid
                    nullable: true
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    # -- Delegated agent tokens (§26.1, Epic #1059) --
    DelegatedTokenRequest:
      type: object
      required: [delegated_for]
      properties:
        delegated_for:
          type: integer
          minimum: 1
          description: The human user id the agent will act on behalf of.
          example: 42
        scope:
          type: string
          maxLength: 500
          description: |
            Optional space-delimited scope narrowing. Omitted → the full
            grantable intersection (agent ∩ user content scopes). Never widens
            beyond that; unknown or non-content scopes simply drop out.
          example: "content:read content:create"

    DelegatedTokenResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [access_token, token_type, expires_in, scope, delegated_for]
          properties:
            access_token:
              type: string
              description: |
                The signed delegated JWT. `sub` is the system user; the human
                is named by the numeric `delegated_for` claim; `act.sub`
                carries the agent's (non-numeric) client id for audit.
            token_type:
              type: string
              enum: [Bearer]
            expires_in:
              type: integer
              description: Token lifetime in seconds (300).
              example: 300
            scope:
              type: string
              description: |
                The minted scopes, space-delimited and sorted — requested ∩
                agent content scopes ∩ user role-derived content scopes; never
                includes `content:delegate`.
              example: "content:create content:read"
            delegated_for:
              type: integer
              description: The acting-for human user id (echoed from the request).
              example: 42
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    # -- Tool catalog version (Issue #927) --
    ToolVersion:
      type: object
      description: A single version of a catalog tool.
      required:
        - identifier
        - version
        - name
        - description
        - surfaces
        - requiredScopes
        - agentCallable
        - isActive
        - deprecated
      properties:
        identifier:
          type: string
          description: Stable `domain.action` identifier.
          example: documents.create
        version:
          type: string
          description: Version token.
          example: v1
        name:
          type: string
          description: Wire/model-facing tool name.
        description:
          type: string
        inputSchema:
          type: object
          description: JSON Schema for the tool input.
        outputSchema:
          type: object
          nullable: true
        surfaces:
          type: array
          items:
            type: string
            enum: [mcp, ai_sdk, rest, internal]
        requiredScopes:
          type: array
          items:
            type: string
        agentCallable:
          type: boolean
        isActive:
          type: boolean
        deprecated:
          type: boolean
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
        replacedBy:
          type: string
          nullable: true
          description: Successor `identifier@version`, when deprecated.
          example: documents.create@v2
        removalDate:
          type: string
          format: date-time
          nullable: true
          description: Date after which this version may be removed.

    # -- Error --
    ErrorResponse:
      type: object
      required: [error, requestId]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              description: Validation issue details (Zod format)
        requestId:
          type: string

  # ---- Reusable Responses ----
  responses:
    ValidationError:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INVALID_TOKEN
              message: Invalid API key
            requestId: req_abc123
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    Forbidden:
      description: Insufficient scope for this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INSUFFICIENT_SCOPE
              message: "Missing required scope: graph:write"
            requestId: req_abc123
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    ContentConflict:
      description: |
        A uniqueness/version race, an in-flight idempotent operation
        (`IDEMPOTENCY_IN_PROGRESS`, retryable), or reuse of an idempotency key
        with different input (`IDEMPOTENCY_KEY_REUSED`).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: CONTENT_CONFLICT
              message: Conflict
            requestId: req_abc123
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
        Retry-After:
          description: Present for `IDEMPOTENCY_IN_PROGRESS`.
          schema:
            type: integer
            example: 1

    VersionPreconditionFailed:
      description: The supplied If-Match value no longer matches the current version.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VERSION_PRECONDITION_FAILED
              message: The content version changed before this update was applied
              details:
                expectedVersionId: 11111111-2222-4333-8444-555555555555
                currentVersionId: aaaaaaaa-bbbb-4ccc-8ddd-eeeeeeeeeeee
            requestId: req_abc123
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Too many requests. Please try again later.
            requestId: req_abc123
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
            example: 60
        X-RateLimit-Limit:
          $ref: "#/components/headers/X-RateLimit-Limit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/X-RateLimit-Remaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/X-RateLimit-Reset"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    ContentStorageUnavailable:
      description: Canonical source storage is unavailable or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
