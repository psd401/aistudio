openapi: 3.1.0
info:
  title: AI Studio API
  version: "1.0"
  description: |
    RESTful API for AI Studio. Includes context graph management,
    assistant execution, and multi-turn conversations.
    Part of the AI Studio External API Platform (Epic #674).

    ## Authentication

    All endpoints under `/api/v1/graph/` require authentication via one of:

    - **API Key**: `Authorization: Bearer sk-...`
    - **Session**: Browser session cookie (for logged-in users)

    API keys are created in the AI Studio Settings > API Keys page.
    Each key has scoped permissions (`graph:read`, `graph:write`).
    Session-authenticated users receive full access for their role.

    Atrium content endpoints (`/api/v1/content/*`, `/api/v1/agents/delegated-token`)
    are **Bearer-only** (no session cookie) and gated by the content scopes:
    `content:read`, `content:create`, `content:update`, `content:delete`,
    `content:publish_internal`, `content:publish_public`, and the agent-held minting
    authority `content:delegate` (required by `POST /api/v1/agents/delegated-token`;
    never present in a minted delegated token). `content:delete` is granted to staff
    and administrator; the service still gates every delete to the object's OWNER or
    an admin, so a key holding it can only remove content its owner owns.

    ## Rate Limiting

    API key requests are rate-limited using a sliding window counter.
    Default: **60 requests per minute** per API key (configurable per key).
    Session-authenticated requests are not subject to per-key rate limiting.

    Rate limit headers are included on every response:
    - `X-RateLimit-Limit` — Maximum requests per window
    - `X-RateLimit-Remaining` — Remaining requests in current window
    - `X-RateLimit-Reset` — Unix timestamp (seconds) when the window resets

    When rate-limited, a `429` response includes a `Retry-After` header (seconds).

    ## Pagination

    List endpoints use cursor-based pagination. Pass `cursor` from the
    previous response's `meta.nextCursor` to fetch the next page.
    Cursors are opaque base64url-encoded strings. Do not construct them manually.

    ## Tool-backed endpoints (catalog-generated)

    Endpoints backed by a unified tool-catalog entry (surfaces include `rest`) —
    e.g. `POST /api/v1/assistants/{id}/execute`, `GET /api/v1/assistants` — are
    also described by a spec GENERATED from the catalog manifest at
    `docs/API/v1/generated/tool-catalog.openapi.json` (run `bun run
    openapi:generate`; CI runs `openapi:check`). Each generated operation carries
    `x-tool-identifier`/`x-tool-version`, the REST scope resolved from the
    catalog, its success responses (e.g. execute emits `200` SSE and `202` async),
    and the shared auth/validation error codes (`401`/`403`/`500`, plus
    `400`/`404`/`429` on write methods). This hand-authored file covers the
    remainder of the surface (graph, conversations, jobs, health). See issue #924
    (Epic #922).

  contact:
    name: AI Studio Team
  license:
    name: Proprietary

servers:
  - url: /api/v1
    description: API v1 base path

tags:
  - name: Health
    description: Service health check
  - name: Nodes
    description: Context graph node operations
  - name: Edges
    description: Context graph edge operations
  - name: Decisions
    description: High-level decision capture (creates nodes + edges in one call)
  - name: Assistants
    description: Assistant listing, execution, and multi-turn conversations
  - name: Jobs
    description: Async job polling and cancellation
  - name: Voice
    description: Real-time voice conversations via WebSocket with Gemini Live API
  - name: Tools
    description: Tool catalog inspection — versions, deprecation state, and metadata
  - name: Content
    description: Atrium content objects — versions, visibility, and publishing (Issue #1055)
  - name: Agents
    description: Agent identity operations — delegated content token minting (Atrium §26.1, Epic #1059)

# ============================================
# Paths
# ============================================

paths:
  /api/nexus/voice/availability:
    get:
      operationId: getVoiceAvailability
      tags: [Voice]
      summary: Voice mode availability check
      description: |
        Returns voice availability with a human-readable reason string.
        Clients call this before attempting a WebSocket connection.

        Checks: admin kill switch, role-based permission, provider config, API key.
        Response is cached (Cache-Control: max-age=30, private).
      security:
        - sessionAuth: []
      responses:
        "200":
          description: Voice availability status
          content:
            application/json:
              schema:
                type: object
                required: [available]
                properties:
                  available:
                    type: boolean
                    description: Whether voice mode is available for this user
                  reason:
                    type: string
                    description: Human-readable reason when unavailable
                    example: Voice mode is disabled by administrator
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        "500":
          description: Internal server error

  /health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      description: Public endpoint. Returns service status. No authentication required.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"

  /graph/nodes:
    get:
      operationId: listNodes
      tags: [Nodes]
      summary: List nodes
      description: |
        Returns a paginated list of graph nodes.
        Supports filtering by `nodeType`, `nodeClass`, and full-text `search`
        (searches `name` and `description` fields via case-insensitive match).
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - $ref: "#/components/parameters/nodeTypeFilter"
        - $ref: "#/components/parameters/nodeClassFilter"
        - $ref: "#/components/parameters/searchFilter"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/cursorParam"
      responses:
        "200":
          description: Paginated list of nodes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeListResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createNode
      tags: [Nodes]
      summary: Create a node
      description: Creates a new graph node. Requires `graph:write` scope.
      security:
        - BearerAuth: []
        - SessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNodeRequest"
      responses:
        "201":
          description: Node created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeSingleResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /graph/nodes/{nodeId}:
    parameters:
      - $ref: "#/components/parameters/nodeIdPath"

    get:
      operationId: getNode
      tags: [Nodes]
      summary: Get a node
      description: Returns a single graph node by ID. Requires `graph:read` scope.
      security:
        - BearerAuth: []
        - SessionAuth: []
      responses:
        "200":
          description: Node details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeSingleResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: updateNode
      tags: [Nodes]
      summary: Update a node
      description: |
        Partially updates a graph node. At least one field must be provided.
        Requires `graph:write` scope.
      security:
        - BearerAuth: []
        - SessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNodeRequest"
      responses:
        "200":
          description: Node updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeSingleResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteNode
      tags: [Nodes]
      summary: Delete a node
      description: |
        Deletes a graph node. All connected edges are cascade-deleted.
        Requires `graph:write` scope.
      security:
        - BearerAuth: []
        - SessionAuth: []
      responses:
        "200":
          description: Node deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /graph/nodes/{nodeId}/connections:
    parameters:
      - $ref: "#/components/parameters/nodeIdPath"

    get:
      operationId: getNodeConnections
      tags: [Nodes]
      summary: Get node connections
      description: |
        Returns all edges connected to a node (both incoming and outgoing)
        along with the connected node's summary info. Requires `graph:read` scope.
      security:
        - BearerAuth: []
        - SessionAuth: []
      responses:
        "200":
          description: List of connections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionListResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /graph/edges:
    get:
      operationId: listEdges
      tags: [Edges]
      summary: List edges
      description: |
        Returns a paginated list of graph edges.
        Supports filtering by `edgeType`, `sourceNodeId`, and `targetNodeId`.
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: edgeType
          in: query
          description: Filter by edge type (exact match)
          schema:
            type: string
            maxLength: 100
        - name: sourceNodeId
          in: query
          description: Filter by source node UUID
          schema:
            type: string
            format: uuid
        - name: targetNodeId
          in: query
          description: Filter by target node UUID
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/cursorParam"
      responses:
        "200":
          description: Paginated list of edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EdgeListResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createEdge
      tags: [Edges]
      summary: Create an edge
      description: |
        Creates a new edge between two existing nodes.
        Self-referencing edges (same source and target) are rejected.
        Duplicate edges (same source, target, and type) return `409`.
        Requires `graph:write` scope.
      security:
        - BearerAuth: []
        - SessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEdgeRequest"
      responses:
        "201":
          description: Edge created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EdgeSingleResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Duplicate edge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /graph/edges/{edgeId}:
    parameters:
      - name: edgeId
        in: path
        required: true
        description: Edge UUID
        schema:
          type: string
          format: uuid

    delete:
      operationId: deleteEdge
      tags: [Edges]
      summary: Delete an edge
      description: Deletes a single edge by ID. Requires `graph:write` scope.
      security:
        - BearerAuth: []
        - SessionAuth: []
      responses:
        "200":
          description: Edge deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ============================================
  # Decisions
  # ============================================

  /graph/decisions:
    post:
      operationId: createDecision
      tags: [Decisions]
      summary: Create a decision subgraph
      description: |
        Accepts a structured decision payload and creates the appropriate
        nodes, edges, and relationships in the context graph. Returns the
        decision node ID, counts of created resources, and a completeness score.

        All node/edge types are drawn from the closed decision vocabulary and
        enforced at write time. `relatedTo` UUIDs are de-duplicated
        (case-insensitively); duplicate or self-referencing edges are rejected
        with a typed `400` validation error carrying a specific message (e.g.
        "A node cannot connect to itself") — never a raw database string.

        The `completenessScore` is always the deterministic rule-based score;
        `completenessMethod` reports whether an optional LLM pass appended
        advisory warnings ("llm-enhanced") or was unavailable ("rule-based").
        Requires `graph:write` scope.
      security:
        - BearerAuth: []
        - SessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDecisionRequest"
      responses:
        "201":
          description: Decision subgraph created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ============================================
  # Assistants
  # ============================================

  /assistants:
    get:
      operationId: listAssistants
      tags: [Assistants]
      summary: List accessible assistants
      description: Returns assistants the authenticated user can access (own, admin, or approved).
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending_approval, approved, rejected, disabled]
        - name: search
          in: query
          schema:
            type: string
            maxLength: 100
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          description: Opaque assistant-id cursor from a previous response's `meta.nextCursor`. Must be a positive integer string.
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
      responses:
        "200":
          description: List of assistants
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssistantListItem"
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      limit:
                        type: integer
                      nextCursor:
                        type: string
                        nullable: true
        "400":
          description: Invalid query parameters (e.g. non-numeric `cursor`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /assistants/{id}:
    get:
      operationId: getAssistant
      tags: [Assistants]
      summary: Get assistant details
      description: Returns full assistant details including input fields.
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assistant details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AssistantDetail"
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /assistants/{id}/execute:
    post:
      operationId: executeAssistant
      tags: [Assistants]
      summary: Execute an assistant
      description: |
        Execute an assistant with the given inputs.
        - `Accept: text/event-stream` (default) returns an SSE stream
        - `Accept: application/json` returns 202 with a jobId for async polling

        Beyond the assistant scope check, the caller must have per-resource access
        (Epic #1202 Phase 3) to BOTH the assistant and the model its last prompt
        uses: a resource restricted to specific roles/Google groups returns 403 to
        a caller who matches no grant (the assistant owner and administrators
        always pass; a resource with no grants is unrestricted).
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: Accept
          in: header
          schema:
            type: string
            enum: [text/event-stream, application/json]
            default: text/event-stream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inputs:
                  type: object
                  additionalProperties: true
                  description: Key-value pairs matching the assistant's input fields
      responses:
        "200":
          description: SSE streaming response (when Accept is text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
        "202":
          description: Job created for async execution (when Accept is application/json)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      jobId:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [pending]
                      pollUrl:
                        type: string
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /assistants/{id}/conversations:
    post:
      operationId: startConversation
      tags: [Assistants]
      summary: Start a conversation with an assistant
      description: >-
        Creates a new conversation, executes the assistant, and returns the SSE
        stream. Beyond the assistant scope check, the caller must have
        per-resource access (Epic #1202 Phase 3) to BOTH the assistant and the
        model its last prompt uses: a resource restricted to specific
        roles/Google groups returns 403 to a caller who matches no grant (the
        assistant owner and administrators always pass; a resource with no
        grants is unrestricted).
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inputs:
                  type: object
                  additionalProperties: true
                title:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: SSE stream with X-Conversation-Id header
          headers:
            X-Conversation-Id:
              schema:
                type: string
                format: uuid
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /assistants/{id}/conversations/{cid}/messages:
    post:
      operationId: sendMessage
      tags: [Assistants]
      summary: Send a follow-up message
      description: >-
        Sends a message in an existing conversation. Preserves assistant context.
        Beyond the assistant scope check, the caller must have per-resource access
        (Epic #1202 Phase 3) to BOTH the assistant and the model it uses: a
        resource restricted to specific roles/Google groups returns 403 to a
        caller who matches no grant (the assistant owner and administrators always
        pass; a resource with no grants is unrestricted).
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: cid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  minLength: 1
                  maxLength: 100000
      responses:
        "200":
          description: SSE stream with assistant response
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /assistants/{id}/conversations/{cid}:
    get:
      operationId: getConversation
      tags: [Assistants]
      summary: Get conversation history
      description: Returns conversation metadata and messages.
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: cid
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      conversation:
                        $ref: "#/components/schemas/ConversationSummary"
                      messages:
                        type: array
                        items:
                          $ref: "#/components/schemas/ConversationMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================
  # Jobs
  # ============================================

  /jobs/{jobId}:
    get:
      operationId: pollJob
      tags: [Jobs]
      summary: Poll job status
      description: Returns current job status, partial content, and final response data.
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: cancelJob
      tags: [Jobs]
      summary: Cancel a running job
      description: Cancels a job in a non-terminal state (pending, processing, streaming).
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job cancelled
        "409":
          description: Job cannot be cancelled (already completed/failed)

  # ============================================
  # Tool catalog versioning (Issue #927)
  # ============================================

  /tools/{identifier}:
    get:
      operationId: getTool
      tags: [Tools]
      summary: Get a tool (latest version, or all versions)
      description: |
        Returns the latest **non-deprecated** version of a tool by its stable
        `identifier` (e.g. `documents.create`). Tool versions are addressed as
        `identifier@version` in the catalog; the REST API stays at `/api/v1`.

        Pass `?include=all` to return every version (including deprecated ones)
        under a `versions` array. Use `/tools/{identifier}/versions/{n}` to fetch
        one specific version.

        Requires the `tools:read` scope.
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: identifier
          in: path
          required: true
          description: Stable tool identifier (e.g. `assistants.execute`).
          schema:
            type: string
        - name: include
          in: query
          required: false
          description: Set to `all` to return every version including deprecated.
          schema:
            type: string
            enum: [all]
      responses:
        "200":
          description: The latest version, or (with include=all) all versions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/ToolVersion"
                      - type: object
                        properties:
                          identifier:
                            type: string
                          versions:
                            type: array
                            items:
                              $ref: "#/components/schemas/ToolVersion"
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /tools/{identifier}/versions/{version}:
    get:
      operationId: getToolVersion
      tags: [Tools]
      summary: Get a specific tool version
      description: |
        Returns the exact `identifier@version` catalog entry. `version` may be
        supplied as `v2` or a bare `2`.

        If the version has been **removed** (past its deprecation grace period),
        this returns `404` with an actionable message — this is the error a
        consumer pinned to a removed version sees. Requires the `tools:read`
        scope.
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          description: Version token (`v2`) or bare integer (`2`).
          schema:
            type: string
      responses:
        "200":
          description: The requested tool version.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ToolVersion"
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================
  # Atrium Content (Issue #1055, Phase 5)
  # ============================================

  /content:
    get:
      operationId: listContent
      tags: [Content]
      summary: List visible content
      description: |
        Returns content objects the authenticated caller may view
        (permission-filtered server-side). Mirrors the MCP `list_content` tool.
        Requires the `content:read` scope.
      security:
        - BearerAuth: []
      parameters:
        - name: kind
          in: query
          description: Filter by content kind
          schema:
            type: string
            enum: [document, artifact]
        - name: collection
          in: query
          description: Collection slug or UUID to scope the listing
          schema:
            type: string
            maxLength: 200
        - name: tag
          in: query
          description: Filter by a single tag (exact match)
          schema:
            type: string
            maxLength: 100
        - name: status
          in: query
          description: Filter by lifecycle status
          schema:
            type: string
            enum: [draft, published, archived]
        - name: query
          in: query
          description: Case-insensitive title substring search
          schema:
            type: string
            minLength: 1
            maxLength: 200
      responses:
        "200":
          description: List of visible content objects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createContent
      tags: [Content]
      summary: Create a content object
      description: |
        Creates a document or artifact. Does NOT publish it. When `body` is
        supplied, an initial version (v1) is snapshotted. Mirrors the MCP
        `create_document` / `create_artifact` tools. Requires `content:create`.

        **Public create-as-private (§26.4, issue #1118):** creating directly at
        `visibility.level: "public"` (explicitly, or via a collection whose default
        visibility is `public`) without `content:publish_public` is NOT blocked and
        does NOT error. The object is created at `visibility.level: "private"`
        (returned in the `201` body) and a durable `visibility_widen` approval
        request is queued for it — an admin approves it at /admin/atrium to make it
        public. Inspect `data.visibilityLevel` in the response to see whether the
        requested `public` was applied or downgraded to `private`. (This differs
        from `POST /content/{id}/publish` and `set_visibility`, which still return
        **HTTP 202** `approval_required` because there is an existing object to gate.)
        The MCP `create_document` / `create_artifact` tool results include the same
        `visibilityLevel` field for the same reason.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentRequest"
      responses:
        "201":
          description: |
            Content object created (includes current version and reader `url`). When
            `public` was requested without `content:publish_public`, the object is
            created `private` and a `visibility_widen` approval is queued — check
            `data.visibilityLevel` (issue #1118 create-as-private).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentObjectResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/ContentConflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/{id}:
    parameters:
      - $ref: "#/components/parameters/contentIdPath"

    get:
      operationId: getContent
      tags: [Content]
      summary: Get a content object
      description: |
        Returns a single content object joined with its current version and the
        internal reader `url`. View permission is enforced server-side; objects
        the caller may not view return `404` (not `403`). Mirrors the MCP
        `get_content` tool. Requires `content:read`.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Content object with current version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentObjectResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: updateContent
      tags: [Content]
      summary: Update content metadata
      description: |
        Updates object metadata only — `title`, `tags`, `collectionId`, and
        `status`. Body changes go through the versions endpoint. `collectionId`
        accepts a slug or UUID; `null` clears the collection, `null` tags clears
        all tags. Mirrors the MCP `update_content` tool. Requires `content:update`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContentRequest"
      responses:
        "200":
          description: Updated content object metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentMetadataResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteContent
      tags: [Content]
      summary: Delete a content object (hard delete)
      description: |
        PERMANENTLY deletes a content object and every dependent row (all versions,
        publications, live-collab state, comments, embed links, visibility grants,
        publish-approval requests, and its retrieval-index entry) plus its S3 bodies.
        This is irreversible — prefer `PATCH` to `status: "archived"` for reversible
        cleanup.

        Guards, in order (an unviewable object never reveals its existence):
        objects the caller may not view return `404` (not `403`); a viewable object
        the caller does not OWN (and is not an admin) returns `403`; and an object
        that is still LIVE at any publish destination returns `409` — delete never
        auto-unpublishes, so the caller must unpublish everywhere first.

        Requires `content:delete`. The service additionally enforces owner/admin, so
        a key holding the scope can only delete content its owner owns. A `delete`
        row is written to the append-only content audit trail (capturing the removed
        object's title/kind/owner) before the object row disappears.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The object was deleted; returns a summary of what was removed.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [id, slug, title, kind, versionsDeleted]
                    properties:
                      id:
                        type: string
                        format: uuid
                      slug:
                        type: string
                      title:
                        type: string
                      kind:
                        type: string
                        enum: [document, artifact]
                      versionsDeleted:
                        type: integer
                        description: Immutable version rows removed with the object.
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId:
                        type: string
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/ContentConflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/{id}/versions:
    parameters:
      - $ref: "#/components/parameters/contentIdPath"

    get:
      operationId: listContentVersions
      tags: [Content]
      summary: List content versions
      description: |
        Returns the object's versions, newest first. View permission is enforced
        (404-masked) before the list is exposed. Requires `content:read`.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of versions (newest first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentVersionListResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createContentVersion
      tags: [Content]
      summary: Create a content version
      description: |
        Snapshots a new version from `body` (with an optional change `summary`)
        and makes it the object's current version. Mirrors the MCP `create_version`
        tool. Requires `content:update`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionRequest"
      responses:
        "201":
          description: Version created (returns the object with its new current version)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentObjectResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/ContentConflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/{id}/visibility:
    parameters:
      - $ref: "#/components/parameters/contentIdPath"

    patch:
      operationId: setContentVisibility
      tags: [Content]
      summary: Set content visibility
      description: |
        Sets the visibility `level` and (for `group`) the widening `grants`. The
        route loads the object (enforcing view permission, 404-masked) and gates
        edit before mutating. Mirrors the MCP `set_visibility` tool. Requires
        `content:update`.

        **Public-publish gate (§26.4):** widening to `level: "public"` without
        `content:publish_public` is NOT an error — it returns **HTTP 202** with
        `data.status = "approval_required"`, the same gate `POST /content/{id}/publish`
        enforces (a `content:update`-only caller cannot reach "public" through
        this endpoint either).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentVisibility"
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentVisibilityResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "202":
          description: |
            Approval required — widening to `public` was requested without
            `content:publish_public`. The request is queued for human review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentApprovalRequiredResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/{id}/publish:
    parameters:
      - $ref: "#/components/parameters/contentIdPath"

    post:
      operationId: publishContent
      tags: [Content]
      summary: Publish a content object
      description: |
        Publishes the object's current version to a destination. Mirrors the MCP
        `publish_content` tool. Requires `content:publish_internal`.

        The `okf` destination (Phase 8) serializes the single object to a portable
        Open Knowledge Format concept bundle in S3 (internal-publish authority — not
        a public destination); for a whole collection use `POST /content/export/okf`.

        **Public-publish gate (§26.4):** a public-facing destination/visibility
        requested by a caller lacking `content:publish_public` is NOT an error —
        it returns **HTTP 202** with `data.status = "approval_required"` and the
        request enters the review queue instead of publishing.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishContentRequest"
      responses:
        "200":
          description: Published to the destination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPublishResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "202":
          description: |
            Approval required — a public publish was requested without
            `content:publish_public`. The request is queued for human review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentApprovalRequiredResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/{id}/publish/{destination}:
    parameters:
      - $ref: "#/components/parameters/contentIdPath"
      - $ref: "#/components/parameters/publishDestinationPath"

    delete:
      operationId: unpublishContent
      tags: [Content]
      summary: Unpublish a content object
      description: |
        Removes the object's live publication at a destination. Idempotent:
        unpublishing an object that is not live there returns `unpublished: false`
        rather than erroring. Mirrors the MCP `unpublish_content` tool. Requires
        `content:publish_internal`.

        **Public-publish gate (§26.4):** taking down any public-facing
        destination (`public_web`, `schoology`, `google`) requires the same
        `content:publish_public` authority needed to publish it in the first
        place — `content:publish_internal` alone is enough only for `intranet`.
        Without it this returns **HTTP 202** with
        `data.status = "approval_required"`.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Unpublish result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentUnpublishResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "202":
          description: |
            Approval required — unpublishing a public-facing destination
            (`public_web`, `schoology`, `google`) was requested without
            `content:publish_public`. The request is queued for human review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentApprovalRequiredResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/export/okf:
    post:
      operationId: exportOkf
      tags: [Content]
      summary: Export a collection as an OKF bundle
      description: |
        Serializes a `content_collections` subtree to a portable **Open Knowledge
        Format (OKF v0.1)** bundle: one markdown-with-YAML-frontmatter concept file
        per content object, an `index.md` per collection, and a `log.md` change
        history (spec §36). Mirrors the MCP `export_okf` tool. Requires
        `content:read`.

        **Permission-at-export (the security-critical surface):** every object is
        filtered by the caller's view permission (`visibilityService.canView`,
        pushed into SQL) — a bundle requested by a student identity contains no
        staff-only concept.

        **Public bundles (§26.4 gate):** `audience: "public"` produces an
        anonymous-safe bundle (only `visibility_level = 'public'` objects) and
        requires `content:publish_public`. Without it — including for EVERY
        autonomous agent — this returns **HTTP 202** with
        `data.status = "approval_required"` and the request enters the review queue.

        The bundle is returned inline (`data.files`) and also persisted to S3; a
        presigned `data.location` URL points at the stored JSON.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OkfExportRequest"
      responses:
        "200":
          description: The OKF bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkfExportResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "202":
          description: |
            Approval required — a public bundle was requested without
            `content:publish_public`. The request is queued for human review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentApprovalRequiredResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/import/okf:
    post:
      operationId: importOkf
      tags: [Content]
      summary: Import an OKF bundle into content
      description: |
        Imports an OKF bundle (the `{ files: [{ path, content }] }` shape
        `export_okf` returns) into Atrium content (spec §36.3). Reconstructs the
        collection tree from the bundle directories and creates one content object
        per concept file. Mirrors the MCP `import_okf` tool. Requires
        `content:create`.

        **Provenance:** imported objects are **agent-authored**
        (`actor_kind = 'agent'`, attributed to the seeded `atrium-importer`
        identity) and created **private + draft** — never fabricated human
        authorship, never pre-widened. The triggering caller is recorded in the
        audit trail.

        **Retry semantics:** import is additive and NOT transactional. A run that
        fails partway leaves the already-created private/draft content in place, and
        a retry re-imports the whole bundle as new objects (no dedup). For
        idempotency, import into a fresh `targetCollectionId` and delete that partial
        collection before retrying.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OkfImportRequest"
      responses:
        "201":
          description: Imported objects + reconstructed collections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkfImportResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /agents/delegated-token:
    post:
      operationId: mintDelegatedToken
      tags: [Agents]
      summary: Mint a short-lived delegated content token
      description: |
        Exchanges an autonomous agent's OAuth client-credentials JWT for a
        **short-lived (300 s) delegated token** acting on behalf of a named
        human user (Atrium §26.1, Epic #1059). Requires the agent-held
        `content:delegate` scope, AND the caller must be an **OIDC agent
        bearer** (a client-credentials JWT whose client id maps to an ACTIVE
        agent identity). A session or `sk-` API key cannot mint even if it
        holds the scope, and a delegated token cannot re-mint (both `403
        FORBIDDEN`).

        **Scope bounding:** minted scope = requested ∩ the agent's content
        scopes ∩ the acting-for user's role-derived content scopes. The result
        never includes `content:delegate`, and includes
        `content:publish_public` only when the user is an administrator AND
        the agent holds it. An empty intersection is `403 INSUFFICIENT_SCOPE`
        — no token is minted.

        **Claims:** the token's `sub` is the low-privilege SYSTEM user
        (§26.5), not the human; the human is named by the numeric
        `delegated_for` claim, which only the content surface consumes. Use
        the returned `access_token` as the Bearer token on
        `/api/v1/content/*`.

        **Stateless:** the token is signed by the platform OIDC signer and is
        NOT persisted — it cannot be revoked before expiry; the 300-second TTL
        is the mitigation.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DelegatedTokenRequest"
      responses:
        "200":
          description: The delegated token (never persisted; expires in 300 s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegatedTokenResponse"
              example:
                data:
                  access_token: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
                  token_type: Bearer
                  expires_in: 300
                  scope: "content:create content:read"
                  delegated_for: 42
                meta:
                  requestId: req_abc123
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Not mintable — the caller lacks `content:delegate`
            (`INSUFFICIENT_SCOPE`), is not an OIDC token backed by an active
            agent identity or is itself a delegated token (`FORBIDDEN`), or
            the requested ∩ agent ∩ user scope intersection is empty
            (`INSUFFICIENT_SCOPE`). An UNKNOWN `delegated_for` user also
            returns `INSUFFICIENT_SCOPE` (an unknown user has no grantable
            scopes) rather than a distinct 404 — the two are deliberately
            indistinguishable so a delegation-capable agent cannot enumerate
            which user ids exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notAnAgent:
                  summary: Session or sk- API key caller (not an OIDC agent identity)
                  value:
                    error:
                      code: FORBIDDEN
                      message: Delegated tokens can only be minted by an OIDC agent identity
                    requestId: req_abc123
                alreadyDelegated:
                  summary: A delegated token cannot re-mint
                  value:
                    error:
                      code: FORBIDDEN
                      message: A delegated token cannot mint further delegated tokens
                    requestId: req_abc123
                emptyIntersection:
                  summary: No grantable scopes for this agent + user combination
                  value:
                    error:
                      code: INSUFFICIENT_SCOPE
                      message: No content scopes are grantable for this agent + user combination
                    requestId: req_abc123
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          description: |
            `CONFIGURATION_ERROR` when `ATRIUM_SYSTEM_USER_ID` is not
            configured (delegated minting is disabled); otherwise an
            unexpected server error (`INTERNAL_ERROR`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: CONFIGURATION_ERROR
                  message: Delegated token minting is not configured
                requestId: req_abc123
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"

# ============================================
# Components
# ============================================

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "API key token (prefix: `sk-`) or OIDC bearer JWT (agent client-credentials / delegated)"
    SessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: Browser session cookie (NextAuth)

  # ---- Parameters ----
  parameters:
    nodeIdPath:
      name: nodeId
      in: path
      required: true
      description: Node UUID
      schema:
        type: string
        format: uuid

    nodeTypeFilter:
      name: nodeType
      in: query
      description: Filter by node type (exact match)
      schema:
        type: string
        maxLength: 100

    nodeClassFilter:
      name: nodeClass
      in: query
      description: Filter by node class (exact match)
      schema:
        type: string
        maxLength: 100

    searchFilter:
      name: search
      in: query
      description: Case-insensitive search across name and description
      schema:
        type: string
        minLength: 1
        maxLength: 100

    limitParam:
      name: limit
      in: query
      description: "Maximum items per page (default: 50, max: 100)"
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    cursorParam:
      name: cursor
      in: query
      description: Opaque pagination cursor from a previous response's `meta.nextCursor`
      schema:
        type: string

    contentIdPath:
      name: id
      in: path
      required: true
      description: Content object UUID
      schema:
        type: string
        format: uuid

    publishDestinationPath:
      name: destination
      in: path
      required: true
      description: |
        Destination to unpublish from. No `okf`: an okf publication is a
        serialized S3 bundle with no live surface to take down (the route
        rejects it with 400).
      schema:
        type: string
        enum: [intranet, public_web, schoology, google]

  # ---- Headers ----
  headers:
    X-Request-Id:
      description: Unique request identifier for tracing
      schema:
        type: string
        example: req_abc123def456
    X-RateLimit-Limit:
      description: Maximum requests allowed per 1-minute window
      schema:
        type: integer
        example: 60
    X-RateLimit-Remaining:
      description: Requests remaining in current window
      schema:
        type: integer
        example: 57
    X-RateLimit-Reset:
      description: Unix timestamp (seconds) when the rate limit window resets
      schema:
        type: integer
        example: 1706832060

  # ---- Schemas ----
  schemas:
    # -- Assistants --
    AssistantListItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, pending_approval, approved, rejected, disabled]
        inputFieldCount:
          type: integer
        promptCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AssistantDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        timeoutSeconds:
          type: integer
          nullable: true
        inputFields:
          type: array
          items:
            $ref: "#/components/schemas/AssistantInputField"
        promptCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AssistantInputField:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        label:
          type: string
        fieldType:
          type: string
          enum: [short_text, long_text, select, multi_select, file_upload]
        position:
          type: integer
        options:
          type: object
          nullable: true

    ConversationSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        provider:
          type: string
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
          nullable: true
        parts:
          type: array
          items:
            type: object
        createdAt:
          type: string
          format: date-time

    # -- Jobs --
    JobStatus:
      type: object
      properties:
        data:
          type: object
          properties:
            jobId:
              type: string
              format: uuid
            status:
              type: string
              enum: [pending, processing, streaming, completed, failed, cancelled]
            createdAt:
              type: string
              format: date-time
            completedAt:
              type: string
              format: date-time
              nullable: true
            partialContent:
              type: string
            responseData:
              type: object
              nullable: true
              description: Final response (only when status is completed)
            errorMessage:
              type: string
              nullable: true
              description: Error details (only when status is failed)
            pollingInterval:
              type: integer
              description: Recommended polling interval in milliseconds
            shouldContinuePolling:
              type: boolean
        meta:
          type: object
          properties:
            requestId:
              type: string

    # -- Health --
    HealthResponse:
      type: object
      required: [status, version, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
          example: v1
        timestamp:
          type: string
          format: date-time

    # -- Node --
    GraphNode:
      type: object
      required: [id, nodeType, nodeClass, name, metadata, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        nodeType:
          type: string
          description: "Category of the node (e.g. `decision`, `person`, `document`)"
        nodeClass:
          type: string
          description: "Sub-classification (e.g. `policy`, `budget`, `hiring`)"
        name:
          type: string
        description:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key-value metadata
        createdBy:
          type: integer
          nullable: true
          description: User ID of the creator
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateNodeRequest:
      type: object
      required: [name, nodeType, nodeClass]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 500
        nodeType:
          type: string
          minLength: 1
          maxLength: 100
        nodeClass:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 5000
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    UpdateNodeRequest:
      type: object
      description: At least one field must be provided.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 500
        nodeType:
          type: string
          minLength: 1
          maxLength: 100
        nodeClass:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 5000
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    # -- Edge --
    GraphEdge:
      type: object
      required: [id, sourceNodeId, targetNodeId, edgeType, metadata, createdAt]
      properties:
        id:
          type: string
          format: uuid
        sourceNodeId:
          type: string
          format: uuid
        targetNodeId:
          type: string
          format: uuid
        edgeType:
          type: string
          description: "Relationship type (e.g. `informed_by`, `related_to`)"
        metadata:
          type: object
          additionalProperties: true
        createdBy:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateEdgeRequest:
      type: object
      required: [sourceNodeId, targetNodeId, edgeType]
      properties:
        sourceNodeId:
          type: string
          format: uuid
        targetNodeId:
          type: string
          format: uuid
          description: Must differ from sourceNodeId
        edgeType:
          type: string
          minLength: 1
          maxLength: 100
        metadata:
          type: object
          additionalProperties: true

    # -- Decision --
    CreateDecisionRequest:
      type: object
      required: [decision, decidedBy]
      properties:
        decision:
          type: string
          minLength: 1
          maxLength: 2000
          description: What was decided
        decidedBy:
          type: string
          minLength: 1
          maxLength: 500
          description: Who proposed or made the decision
        reasoning:
          type: string
          maxLength: 5000
          description: Rationale behind the decision
        evidence:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 2000
          description: Data or observations that informed the decision
        constraints:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 2000
          description: Limiting factors (budget, timeline, policy, etc.)
        conditions:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 2000
          description: Future triggers that would cause revisiting
        alternatives_considered:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 2000
          description: Rejected alternatives
        relatedTo:
          type: array
          maxItems: 50
          items:
            type: string
            format: uuid
          description: >-
            Existing node IDs to link via CONTEXT edges. De-duplicated
            case-insensitively before edges are created; every ID must reference
            an existing node or the request fails with a 400.
        agentId:
          type: string
          maxLength: 200
          description: External agent identifier (sets source to "agent")
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key-value pairs attached to the decision node

    DecisionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [decisionNodeId, nodesCreated, edgesCreated, completenessScore, completenessMethod]
          properties:
            decisionNodeId:
              type: string
              format: uuid
              description: UUID of the primary decision node
            nodesCreated:
              type: integer
              description: Total number of nodes created
            edgesCreated:
              type: integer
              description: Total number of edges created
            completenessScore:
              type: integer
              minimum: 0
              maximum: 100
              description: "Deterministic rule-based completeness score (0-100), 25 points per criterion: decision node, person, evidence/constraint, condition. The optional LLM pass never changes this number."
            completenessMethod:
              type: string
              enum: [rule-based, llm-enhanced]
              description: >-
                "llm-enhanced" when the optional LLM pass ran and may have
                appended advisory warnings; "rule-based" when it was
                unavailable or failed. The score is rule-based either way.
            warnings:
              type: array
              items:
                type: string
              description: Completeness warnings (missing elements, plus LLM advisory insights when completenessMethod is "llm-enhanced"). Omitted when empty.
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    # -- Connection --
    NodeConnection:
      type: object
      required: [edge, connectedNode, direction]
      properties:
        edge:
          $ref: "#/components/schemas/GraphEdge"
        connectedNode:
          type: object
          required: [id, name, nodeType, nodeClass]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            nodeType:
              type: string
            nodeClass:
              type: string
        direction:
          type: string
          enum: [outgoing, incoming]

    # -- Response Wrappers --
    NodeListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        meta:
          type: object
          required: [requestId, limit, nextCursor]
          properties:
            requestId:
              type: string
            limit:
              type: integer
            nextCursor:
              type: string
              nullable: true

    NodeSingleResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/GraphNode"
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    EdgeListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"
        meta:
          type: object
          required: [requestId, limit, nextCursor]
          properties:
            requestId:
              type: string
            limit:
              type: integer
            nextCursor:
              type: string
              nullable: true

    EdgeSingleResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/GraphEdge"
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ConnectionListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NodeConnection"
        meta:
          type: object
          required: [requestId, total]
          properties:
            requestId:
              type: string
            total:
              type: integer

    DeleteResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [deletedId]
          properties:
            deletedId:
              type: string
              format: uuid
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    # -- Atrium Content (Issue #1055, Phase 5) --
    ContentVisibility:
      type: object
      required: [level]
      description: |
        Visibility level plus optional group grants. `grants` is only meaningful
        when `level` is `group`; each grant widens visibility along one dimension.
      properties:
        level:
          type: string
          enum: [private, group, internal, public]
        grants:
          type: array
          items:
            $ref: "#/components/schemas/VisibilityGrant"

    VisibilityGrant:
      type: object
      required: [kind, value]
      properties:
        kind:
          type: string
          enum: [role, building, department, grade, user, group]
        value:
          type: string

    ContentObject:
      type: object
      description: A serialized Atrium content object (timestamps are ISO-8601 strings).
      required:
        - id
        - kind
        - title
        - slug
        - ownerUserId
        - createdByActor
        - collectionId
        - visibilityLevel
        - currentVersionId
        - tags
        - status
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [document, artifact]
        title:
          type: string
        slug:
          type: string
        ownerUserId:
          type: integer
        createdByActor:
          type: string
          enum: [human, agent]
        createdByAgentId:
          type: string
          nullable: true
        collectionId:
          type: string
          format: uuid
          nullable: true
        visibilityLevel:
          type: string
          enum: [private, group, internal, public]
        currentVersionId:
          type: string
          format: uuid
          nullable: true
        sourceRef:
          type: object
          nullable: true
          additionalProperties: true
          description: Provenance reference for content created from another source.
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, published, archived]
        indexedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    ContentVersion:
      type: object
      description: A serialized content version.
      required:
        - id
        - objectId
        - versionNumber
        - authorActor
        - bodyFormat
        - bodyLocation
      properties:
        id:
          type: string
          format: uuid
        objectId:
          type: string
          format: uuid
        versionNumber:
          type: integer
        authorActor:
          type: string
          enum: [human, agent]
        authorUserId:
          type: integer
          nullable: true
        authorAgentId:
          type: string
          nullable: true
        bodyFormat:
          type: string
          enum: [markdown, html, jsx]
        bodyLocation:
          type: string
          description: Storage pointer (e.g. S3 key) for the version body.
        bodyInline:
          type: string
          nullable: true
          description: |
            Raw inline body for small artifacts. SECURITY: untrusted code — only
            render in a code editor or the cross-origin sandboxed iframe, never via
            `dangerouslySetInnerHTML`.
        renderLocation:
          type: string
          nullable: true
        proofDocRef:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true

    ContentObjectWithVersion:
      description: |
        A content object joined with its current version. The internal reader deep
        link (`url`, `/c/{slug}`) is present on create and get responses; it is
        omitted on the create-version response.
      allOf:
        - $ref: "#/components/schemas/ContentObject"
        - type: object
          properties:
            version:
              oneOf:
                - $ref: "#/components/schemas/ContentVersion"
                - type: "null"
              description: Current version, or null when the object has no version yet.
            url:
              type: string
              description: Internal reader deep link (`/c/{slug}`).

    CreateContentRequest:
      type: object
      required: [kind, title]
      properties:
        kind:
          type: string
          enum: [document, artifact]
        title:
          type: string
          minLength: 1
          maxLength: 500
        collectionId:
          type: string
          minLength: 1
          description: Collection slug or UUID; resolved to a collection id server-side.
        body:
          type: string
          description: >-
            Initial body (markdown for a document, code for an artifact). When
            omitted, no v1 is created. If `codeEncoding` is `base64`, this field
            is the base64-encoded body and is decoded server-side before
            screening and size caps.
        bodyFormat:
          type: string
          enum: [markdown, html, jsx]
        codeEncoding:
          type: string
          enum: [base64]
          description: >-
            Transit encoding for `body`. Set `base64` when the body contains
            HTML/JS/CSS (e.g. `<script>`, `<style>`, `style="…"`): the edge WAF
            blocks that markup in a raw request body, so send the body
            base64-encoded and the server decodes it BEFORE §28.3 screening and
            the decoded-size cap (max 5,000,000 decoded bytes). Invalid base64 →
            400. Omit for plain text/markdown (raw body, unchanged behavior).
        visibility:
          $ref: "#/components/schemas/ContentVisibility"
        tags:
          type: array
          items:
            type: string

    UpdateContentRequest:
      type: object
      description: Metadata-only patch. Body changes go through the versions endpoint.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Replaces all tags; `null` clears them.
        collectionId:
          type: string
          nullable: true
          description: Collection slug or UUID; `null` clears the collection.
        status:
          type: string
          enum: [draft, published, archived]

    CreateVersionRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          description: >-
            New body. If `codeEncoding` is `base64`, this is the base64-encoded
            body, decoded server-side before screening and the size cap.
        bodyFormat:
          type: string
          enum: [markdown, html, jsx]
        codeEncoding:
          type: string
          enum: [base64]
          description: >-
            Transit encoding for `body`. Set `base64` when the body contains
            HTML/JS/CSS (`<script>`, `<style>`, `style="…"`) so it is opaque to
            the edge WAF; the server decodes it BEFORE §28.3 screening and the
            decoded-size cap (max 5,000,000 decoded bytes). Invalid base64 → 400.
            Omit for plain text/markdown.
        summary:
          type: string
          maxLength: 2000

    PublishContentRequest:
      type: object
      required: [destination]
      properties:
        destination:
          type: string
          enum: [intranet, public_web, schoology, google, okf]
        visibility:
          $ref: "#/components/schemas/ContentVisibility"

    ContentListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContentObject"
        meta:
          type: object
          required: [requestId, count]
          properties:
            requestId:
              type: string
            count:
              type: integer

    ContentObjectResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ContentObjectWithVersion"
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentMetadataResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ContentObject"
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentVersionListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContentVersion"
        meta:
          type: object
          required: [requestId, count]
          properties:
            requestId:
              type: string
            count:
              type: integer

    ContentVisibilityResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [id, visibility]
          properties:
            id:
              type: string
              format: uuid
            visibility:
              type: object
              required: [visibilityLevel]
              properties:
                visibilityLevel:
                  type: string
                  enum: [private, group, internal, public]
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentPublishResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [id, destination, publishedVersionId]
          properties:
            id:
              type: string
              format: uuid
            destination:
              type: string
              enum: [intranet, public_web, schoology, google, okf]
            publishedVersionId:
              type: string
              format: uuid
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentApprovalRequiredResponse:
      type: object
      description: |
        Returned with HTTP 202 when a public-facing publish is requested by a
        caller lacking `content:publish_public` (the §26.4 approval gate). The
        request is queued for human review rather than published.
      required: [data, meta]
      properties:
        data:
          type: object
          required: [status, message]
          properties:
            status:
              type: string
              enum: [approval_required]
            message:
              type: string
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    ContentUnpublishResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [id, destination, unpublished]
          properties:
            id:
              type: string
              format: uuid
            destination:
              type: string
              enum: [intranet, public_web, schoology, google, okf]
            unpublished:
              type: boolean
              description: "`false` when the object was not live at the destination (idempotent no-op); `true` when an active publication was removed."
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    # -- OKF interoperability (Phase 8, Issue #1103, §36) --
    OkfFile:
      type: object
      description: One file in an OKF bundle — an OKF-relative path + its markdown content.
      required: [path, content]
      properties:
        path:
          type: string
          description: POSIX-relative path within the bundle (e.g. `sub/concept-slug.md`).
          example: "mathematics/fractions.md"
        content:
          type: string
          description: The file's markdown content (concept frontmatter+body, or a reserved `index.md`/`log.md`).

    OkfExportRequest:
      type: object
      required: [collectionId]
      properties:
        collectionId:
          type: string
          description: Root collection slug or id to export.
        audience:
          type: string
          enum: [internal, public]
          default: internal
          description: |
            `internal` (default) scopes the bundle to what the caller can view.
            `public` produces an anonymous-safe bundle (only `visibility_level =
            'public'` objects) and requires `content:publish_public` (§26.4).

    OkfExportResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [okfVersion, files, objectCount, collectionCount]
          properties:
            okfVersion:
              type: string
              example: "0.1"
            generator:
              type: string
              example: "psd-aistudio-atrium/okf-exporter@0.1"
            rootCollectionId:
              type: string
              format: uuid
              nullable: true
            audience:
              type: string
              enum: [internal, public]
            objectCount:
              type: integer
            collectionCount:
              type: integer
            files:
              type: array
              items:
                $ref: "#/components/schemas/OkfFile"
            location:
              type: string
              nullable: true
              description: Presigned URL of the persisted bundle JSON in S3 (null when persistence failed).
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    OkfImportRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          minItems: 1
          maxItems: 1000
          description: "Bundle files. Request-size safety bounds: at most 1000 files, each `path` ≤ 1024 chars and `content` ≤ 5,000,000 chars (oversize → 400)."
          items:
            $ref: "#/components/schemas/OkfFile"
        targetCollectionId:
          type: string
          description: Existing collection slug or id to import the bundle root INTO (a fresh root collection is created when omitted).

    OkfImportResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [collectionsCreated, objectCount, objects]
          properties:
            rootCollectionId:
              type: string
              format: uuid
              nullable: true
            collectionsCreated:
              type: integer
            objectCount:
              type: integer
            objects:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  slug:
                    type: string
                  title:
                    type: string
                  collectionId:
                    type: string
                    format: uuid
                    nullable: true
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    # -- Delegated agent tokens (§26.1, Epic #1059) --
    DelegatedTokenRequest:
      type: object
      required: [delegated_for]
      properties:
        delegated_for:
          type: integer
          minimum: 1
          description: The human user id the agent will act on behalf of.
          example: 42
        scope:
          type: string
          maxLength: 500
          description: |
            Optional space-delimited scope narrowing. Omitted → the full
            grantable intersection (agent ∩ user content scopes). Never widens
            beyond that; unknown or non-content scopes simply drop out.
          example: "content:read content:create"

    DelegatedTokenResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [access_token, token_type, expires_in, scope, delegated_for]
          properties:
            access_token:
              type: string
              description: |
                The signed delegated JWT. `sub` is the system user; the human
                is named by the numeric `delegated_for` claim; `act.sub`
                carries the agent's (non-numeric) client id for audit.
            token_type:
              type: string
              enum: [Bearer]
            expires_in:
              type: integer
              description: Token lifetime in seconds (300).
              example: 300
            scope:
              type: string
              description: |
                The minted scopes, space-delimited and sorted — requested ∩
                agent content scopes ∩ user role-derived content scopes; never
                includes `content:delegate`.
              example: "content:create content:read"
            delegated_for:
              type: integer
              description: The acting-for human user id (echoed from the request).
              example: 42
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string

    # -- Tool catalog version (Issue #927) --
    ToolVersion:
      type: object
      description: A single version of a catalog tool.
      required:
        - identifier
        - version
        - name
        - description
        - surfaces
        - requiredScopes
        - agentCallable
        - isActive
        - deprecated
      properties:
        identifier:
          type: string
          description: Stable `domain.action` identifier.
          example: documents.create
        version:
          type: string
          description: Version token.
          example: v1
        name:
          type: string
          description: Wire/model-facing tool name.
        description:
          type: string
        inputSchema:
          type: object
          description: JSON Schema for the tool input.
        outputSchema:
          type: object
          nullable: true
        surfaces:
          type: array
          items:
            type: string
            enum: [mcp, ai_sdk, rest, internal]
        requiredScopes:
          type: array
          items:
            type: string
        agentCallable:
          type: boolean
        isActive:
          type: boolean
        deprecated:
          type: boolean
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
        replacedBy:
          type: string
          nullable: true
          description: Successor `identifier@version`, when deprecated.
          example: documents.create@v2
        removalDate:
          type: string
          format: date-time
          nullable: true
          description: Date after which this version may be removed.

    # -- Error --
    ErrorResponse:
      type: object
      required: [error, requestId]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              description: Validation issue details (Zod format)
        requestId:
          type: string

  # ---- Reusable Responses ----
  responses:
    ValidationError:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INVALID_TOKEN
              message: Invalid API key
            requestId: req_abc123
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    Forbidden:
      description: Insufficient scope for this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INSUFFICIENT_SCOPE
              message: "Missing required scope: graph:write"
            requestId: req_abc123
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    ContentConflict:
      description: A uniqueness or version race (slug collision, version-number conflict)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: CONTENT_CONFLICT
              message: Conflict
            requestId: req_abc123
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"

    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Too many requests. Please try again later.
            requestId: req_abc123
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
            example: 60
        X-RateLimit-Limit:
          $ref: "#/components/headers/X-RateLimit-Limit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/X-RateLimit-Remaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/X-RateLimit-Reset"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
