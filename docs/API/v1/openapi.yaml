        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/{id}/source:
    parameters:
      - $ref: "#/components/parameters/contentIdPath"
    get:
      operationId: getCurrentContentSource
      tags: [Content]
      summary: Read the current committed source snapshot
      description: |
        Returns the exact canonical UTF-8 source of the current committed version.
        This is an immutable snapshot alias, not unsnapshotted live collaborative
        state. Requires `content:read`; object visibility is checked before storage.
        Missing and unviewable objects both return `404`.

        The strong `ETag` is the current version id. `If-None-Match` returns `304`
        when the head has not changed. Because the alias can advance and permissions
        can change, responses use `Cache-Control: private, no-store`.
      security:
        - BearerAuth: []
      parameters:
        - name: If-None-Match
          in: header
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Current canonical source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentSourceResponse"
          headers:
            ETag:
              schema: { type: string }
              description: Quoted current version id.
            Cache-Control:
              schema: { type: string, example: "private, no-store" }
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
        "304":
          description: The current head matches `If-None-Match`; no body.
          headers:
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ContentStorageUnavailable"

  /content/{id}/versions/{versionId}/source:
    parameters:
      - $ref: "#/components/parameters/contentIdPath"
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getContentVersionSource
      tags: [Content]
      summary: Read a specific immutable version source
      description: |
        Returns the exact canonical UTF-8 source for one retained version. The
        version id is scoped to `{id}`; a version from another object returns the
        same `404` as an absent version. Requires `content:read` and checks object
        visibility before version/storage access.

        The strong `ETag` is the immutable version id. Clients may revalidate with
        `If-None-Match`; the response is private and must revalidate so a later
        visibility revocation is enforced. Bodies are never redirected to S3.
      security:
        - BearerAuth: []
      parameters:
        - name: If-None-Match
          in: header
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Specific immutable canonical source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentSourceResponse"
          headers:
            ETag:
              schema: { type: string }
              description: Quoted immutable version id.
            Cache-Control:
              schema:
                {
                  type: string,
                  example: "private, no-cache, must-revalidate",
                }
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
        "304":
          description: The version matches `If-None-Match`; no body.
          headers:
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ContentStorageUnavailable"

  /content/{id}/visibility:
    parameters:
      - $ref: "#/components/parameters/contentIdPath"

    patch:
      operationId: setContentVisibility
      tags: [Content]
      summary: Set content visibility
      description: |
        Sets the visibility `level` and (for `group`) the widening `grants`. The
        route loads the object (enforcing view permission, 404-masked) and gates
        edit before mutating. Mirrors the MCP `set_visibility` tool. Requires
        `content:update`.

        **Public-publish gate (§26.4):** widening to `level: "public"` without
        `content:publish_public` is NOT an error — it returns **HTTP 202** with
        `data.status = "approval_required"`, the same gate `POST /content/{id}/publish`
        enforces (a `content:update`-only caller cannot reach "public" through
        this endpoint either).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentVisibility"
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentVisibilityResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "202":
          description: |
            Approval required — widening to `public` was requested without
            `content:publish_public`. The request is queued for human review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentApprovalRequiredResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/{id}/publish:
    parameters:
      - $ref: "#/components/parameters/contentIdPath"

    post:
      operationId: publishContent
      tags: [Content]
      summary: Publish a content object
      description: |
        Publishes the object's current version to a destination. Mirrors the MCP
        `publish_content` tool. Requires `content:publish_internal`.

        The `okf` destination (Phase 8) serializes the single object to a portable
        Open Knowledge Format concept bundle in S3 (internal-publish authority — not
        a public destination); for a whole collection use `POST /content/export/okf`.

        **Public-publish gate (§26.4):** a public-facing destination/visibility
        requested by a caller lacking `content:publish_public` is NOT an error —
        it returns **HTTP 202** with `data.status = "approval_required"` and the
        request enters the review queue instead of publishing.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishContentRequest"
      responses:
        "200":
          description: Published to the destination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPublishResponse"
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/Idempotency-Replayed"
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "202":
          description: |
            Approval required — a public publish was requested without
            `content:publish_public`. The request is queued for human review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentApprovalRequiredResponse"
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/Idempotency-Replayed"
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/ContentConflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /content/{id}/publish/{destination}:
    parameters:
      - $ref: "#/components/parameters/contentIdPath"
      - $ref: "#/components/parameters/publishDestinationPath"

    delete:
      operationId: unpublishContent
      tags: [Content]
      summary: Unpublish a content object
      description: |
        Removes the object's live publication at a destination. Idempotent:
        unpublishing an object that is not live there returns `unpublished: false`
        rather than erroring. Mirrors the MCP `unpublish_content` tool. Requires
        `content:publish_internal`.

        **Public-publish gate (§26.4):** taking down any public-facing
        destination (`public_web`, `schoology`, `google`) requires the same
        `content:publish_public` authority needed to publish it in the first
        place — `content:publish_internal` alone is enough only for `intranet`.
        Without it this returns **HTTP 202** with
        `data.status = "approval_required"`.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Unpublish result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentUnpublishResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "202":
          description: |
            Approval required — unpublishing a public-facing destination
            (`public_web`, `schoology`, `google`) was requested without
            `content:publish_public`. The request is queued for human review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentApprovalRequiredResponse"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
