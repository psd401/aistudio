<!doctype html>
<!--
  chart-snippets.html — REFERENCE scaffold for the data register.
  Copy the patterns, not the styling. Charts are hand-built inline SVG, data-driven from an
  inline JSON block, taste-correct (zero baseline, light grid, direct labels, accent ramp,
  role/aria, reduced-motion). For complex/interactive charts use a CDN lib (see data-viz.md).
  Helpers below are intentionally tiny and dependency-free.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chart snippets</title>
<style>
:root{
  --bg:oklch(98.5% 0.005 250);--fg:oklch(24% 0.02 255);--muted:oklch(52% 0.02 255);
  --line:oklch(91% 0.01 255);--grid:oklch(94% 0.008 255);--card:oklch(100% 0 0);
  --accent:oklch(55% 0.15 255);              /* locked accent; ramp derived from this hue */
  --pos:oklch(58% 0.13 150);--neg:oklch(57% 0.16 25);
  --body:system-ui,sans-serif;--mono:ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box}*{margin:0}
body{background:var(--bg);color:var(--fg);font-family:var(--body);line-height:1.5;padding:clamp(1rem,3vw,2rem);max-width:1100px;margin:0 auto}
h2{font-size:1.1rem;margin:2rem 0 .8rem;letter-spacing:-.01em}
h2:first-of-type{margin-top:1rem}
.takeaway{color:var(--muted);font-size:.9rem;margin-bottom:.7rem;max-width:60ch}
/* KPI row */
.kpis{display:grid;gap:.9rem;grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1rem 1.1rem}
.kpi .label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.kpi .val{font-size:2rem;font-weight:700;letter-spacing:-.02em;margin:.15rem 0}
.kpi .delta{font-size:.82rem;font-weight:600;display:inline-flex;align-items:center;gap:.25rem}
.kpi .delta.up{color:var(--pos)}.kpi .delta.down{color:var(--neg)}
.kpi .spark{margin-top:.5rem}
figure{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1.1rem 1.2rem;margin:0}
svg{display:block;width:100%;height:auto;overflow:visible}
.axis text{font-family:var(--mono);font-size:10px;fill:var(--muted)}
.gridline{stroke:var(--grid);stroke-width:1}
.bar{fill:var(--accent)}
.bar.hl{fill:oklch(48% 0.18 255)}
.barlabel{font-family:var(--mono);font-size:10px;fill:var(--fg)}
.refline{stroke:var(--neg);stroke-width:1.5;stroke-dasharray:4 3}
.series-label{font-family:var(--body);font-size:11px;font-weight:600}
@media(prefers-reduced-motion:no-preference){
  .grow{transform-origin:bottom;animation:g .6s cubic-bezier(.2,.8,.2,1) both}
  @keyframes g{from{transform:scaleY(0)}to{transform:scaleY(1)}}
}
@media print{:root{--bg:#fff}.kpi,figure{break-inside:avoid}}
</style>
</head>
<body>
<!-- the data travels with the file -->
<script type="application/json" id="data">
{
  "kpis":[
    {"label":"Tickets closed","val":1284,"unit":"","deltaPct":12,"spark":[8,9,7,11,10,13,12,15]},
    {"label":"Median first response","val":42,"unit":"min","deltaPct":-18,"spark":[60,58,55,49,47,45,44,42]},
    {"label":"CSAT","val":91,"unit":"%","deltaPct":3,"spark":[86,87,88,88,90,90,91,91]}
  ],
  "byCategory":[
    {"name":"Chromebook","value":420},{"name":"Account","value":310},
    {"name":"Network","value":268},{"name":"Software","value":190},{"name":"Other","value":96}
  ],
  "trend":[
    {"month":"Jan","value":820},{"month":"Feb","value":910},{"month":"Mar","value":880},
    {"month":"Apr","value":1010},{"month":"May","value":1190},{"month":"Jun","value":1284}
  ],
  "target":1000
}
</script>

<h2>KPI cards (number, context, trend)</h2>
<div class="kpis" id="kpis"></div>

<h2>Bar chart — tickets by category</h2>
<p class="takeaway">Chromebooks drive a third of all tickets; the top three categories are 78% of volume.</p>
<figure><div id="bar"></div></figure>

<h2>Line + area — monthly volume vs target</h2>
<p class="takeaway">Volume crossed the 1,000-ticket staffing threshold in April and has climbed since.</p>
<figure><div id="line"></div></figure>

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const fmt = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':''+n;
const ns='http://www.w3.org/2000/svg';

/* ---------- KPI cards with sparkline ---------- */
function sparkline(vals,w=120,h=28){
  const min=Math.min(...vals),max=Math.max(...vals),sx=w/(vals.length-1),sy=v=>h-((v-min)/((max-min)||1))*h;
  const d=vals.map((v,i)=>`${i?'L':'M'}${(i*sx).toFixed(1)},${sy(v).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" role="img" aria-label="trend sparkline">
    <path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${(w).toFixed(1)}" cy="${sy(vals.at(-1)).toFixed(1)}" r="2.5" fill="var(--accent)"/></svg>`;
}
document.getElementById('kpis').innerHTML = DATA.kpis.map(k=>{
  const up=k.deltaPct>=0, good = k.label.includes('response') ? !up : up; // lower response time is good
  return `<div class="kpi">
    <div class="label">${k.label}</div>
    <div class="val">${fmt(k.val)}${k.unit?`<span style="font-size:.5em;color:var(--muted)"> ${k.unit}</span>`:''}</div>
    <div class="delta ${good?'up':'down'}">${up?'▲':'▼'} ${Math.abs(k.deltaPct)}% <span style="color:var(--muted);font-weight:400">vs prior</span></div>
    ${sparkline(k.spark)}
  </div>`;
}).join('');

/* ---------- Bar chart (zero baseline, light grid, direct labels) ---------- */
function barChart(el,data,{w=680,h=300,pad=36}={}){
  const max=Math.max(...data.map(d=>d.value)), bw=(w-pad)/data.length;
  const y=v=>h-pad-(v/max)*(h-pad-10);
  const ticks=4, grid=Array.from({length:ticks+1},(_,i)=>Math.round(max*i/ticks));
  let s=`<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="Tickets by category: ${data.map(d=>d.name+' '+d.value).join(', ')}">`;
  s+=`<g class="axis">`+grid.map(g=>`<line class="gridline" x1="${pad}" x2="${w}" y1="${y(g)}" y2="${y(g)}"/><text x="${pad-6}" y="${y(g)+3}" text-anchor="end">${fmt(g)}</text>`).join('')+`</g>`;
  s+=data.map((d,i)=>{
    const bx=pad+i*bw+bw*0.15, bwid=bw*0.7, by=y(d.value), bh=h-pad-by, hl=i===0?'hl':'';
    return `<g class="grow"><rect class="bar ${hl}" x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bwid.toFixed(1)}" height="${bh.toFixed(1)}" rx="3"/></g>
      <text class="barlabel" x="${(bx+bwid/2).toFixed(1)}" y="${(by-5).toFixed(1)}" text-anchor="middle">${d.value}</text>
      <text class="axis" x="${(bx+bwid/2).toFixed(1)}" y="${h-pad+14}" text-anchor="middle" style="font-size:10px;fill:var(--muted)">${d.name}</text>`;
  }).join('');
  s+=`</svg>`; el.innerHTML=s;
}
barChart(document.getElementById('bar'), DATA.byCategory);

/* ---------- Line + area with reference line and end label ---------- */
function lineChart(el,data,target,{w=680,h=300,pad=40}={}){
  const vals=data.map(d=>d.value), max=Math.max(...vals,target)*1.1, min=0;
  const sx=(w-pad-16)/(data.length-1), x=i=>pad+i*sx, y=v=>h-pad-((v-min)/(max-min))*(h-pad-12);
  const line=data.map((d,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${y(d.value).toFixed(1)}`).join(' ');
  const area=`M${x(0).toFixed(1)},${(h-pad).toFixed(1)} `+data.map((d,i)=>`L${x(i).toFixed(1)},${y(d.value).toFixed(1)}`).join(' ')+` L${x(data.length-1).toFixed(1)},${(h-pad).toFixed(1)} Z`;
  const ticks=4, grid=Array.from({length:ticks+1},(_,i)=>Math.round(max*i/ticks));
  let s=`<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="Monthly volume from ${data[0].month} ${data[0].value} to ${data.at(-1).month} ${data.at(-1).value}, target ${target}">`;
  s+=`<defs><linearGradient id="af" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity="0.18"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>`;
  s+=`<g class="axis">`+grid.map(g=>`<line class="gridline" x1="${pad}" x2="${w-16}" y1="${y(g)}" y2="${y(g)}"/><text x="${pad-6}" y="${y(g)+3}" text-anchor="end">${fmt(g)}</text>`).join('')+`</g>`;
  s+=`<line class="refline" x1="${pad}" x2="${w-16}" y1="${y(target)}" y2="${y(target)}"/><text class="axis" x="${w-16}" y="${y(target)-5}" text-anchor="end" style="fill:var(--neg)">target ${fmt(target)}</text>`;
  s+=`<path d="${area}" fill="url(#af)"/><path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>`;
  s+=data.map((d,i)=>`<text class="axis" x="${x(i).toFixed(1)}" y="${h-pad+14}" text-anchor="middle">${d.month}</text>`).join('');
  const last=data.at(-1);
  s+=`<circle cx="${x(data.length-1).toFixed(1)}" cy="${y(last.value).toFixed(1)}" r="3.5" fill="var(--accent)"/>`;
  s+=`<text class="series-label" x="${x(data.length-1).toFixed(1)}" y="${(y(last.value)-9).toFixed(1)}" text-anchor="end" fill="var(--accent)">${fmt(last.value)}</text>`;
  s+=`</svg>`; el.innerHTML=s;
}
lineChart(document.getElementById('line'), DATA.trend, DATA.target);
</script>
</body>
</html>
