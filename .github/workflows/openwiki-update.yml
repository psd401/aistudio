# OpenWiki Update workflow
# Runs the OpenWiki documentation agent (langchain-ai/openwiki) on a schedule to
# keep the agent-navigable `openwiki/` wiki current, then opens/refreshes a single
# rolling PR against `dev`. Not native to Bedrock: OpenWiki talks to OpenRouter by
# default, so this job needs a provider API key stored as a repo secret.
#
# Manual prerequisites (one-time, out of code — see issue #1101):
#   1. Add the `OPENROUTER_API_KEY` repo secret (or the chosen provider's key).
#   2. Enable Settings -> Actions -> General -> Workflow permissions ->
#      "Allow GitHub Actions to create and approve pull requests".
#   3. Generate the initial `openwiki/` tree locally (`bunx openwiki --init`) and
#      commit it — the scheduled `--update` run refreshes an existing wiki.
#
# The scheduled PR is opened by the default GITHUB_TOKEN, so (by GitHub's
# anti-recursion rule) it does NOT trigger ci.yml / claude-code-review.yml. That is
# intentional for a docs-only PR and saves review-bot cost.
name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    # UTC. 08:00 UTC = midnight PST. Weekly (Mon) to bound LLM cost + review noise.
    - cron: "0 8 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Regenerate OpenWiki
    runs-on: ubuntu-latest
    # Runaway guard: caps Actions minutes + LLM spend if a run hangs. Incremental
    # `--update` runs are small; a full first-generation is done locally, not here.
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Harden: do not leave the GITHUB_TOKEN in .git/config while the OpenWiki
          # agent runs arbitrary LLM-driven code with filesystem access. The
          # create-pull-request step below authenticates via its own `token` input
          # (defaults to github.token), so persisted checkout credentials aren't needed.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install OpenWiki
        # Version-pinned: this job runs on a schedule with a provider secret, so we
        # do not auto-adopt an unreviewed OpenWiki release. Bump deliberately.
        run: npm install --global openwiki@0.0.4

      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          OPENWIKI_PROVIDER: openrouter
          OPENWIKI_MODEL_ID: z-ai/glm-5.2
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Optional LangSmith tracing — enable only if a LANGSMITH_API_KEY secret exists:
          # LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          # LANGCHAIN_PROJECT: openwiki
          # LANGCHAIN_TRACING_V2: "true"

      - name: Create OpenWiki update pull request
        # Third-party action — SHA-pinned per ci.yml convention (oven-sh/setup-bun).
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7
        with:
          base: dev
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.
            Generated by the scheduled OpenWiki workflow (`.github/workflows/openwiki-update.yml`).

            Scoped to `openwiki/` only — the hand-curated `CLAUDE.md` is untouched.
