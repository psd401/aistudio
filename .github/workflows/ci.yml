# Continuous Integration workflow
# Runs tests, linting, and type checking on all PRs and main branch pushes
name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test:
    name: Test, Lint, and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Bun
      uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461  # v2
      with:
        bun-version: "1.2.x"
        cache: true

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Run linter
      run: bun run lint

    - name: Run type checking
      run: bun run typecheck

    - name: Run tests
      run: bun run test:ci
      env:
        # Prevent tests from timing out in CI
        CI: true
    
    # Optional: Upload test coverage if you generate it
    # - name: Upload coverage reports
    #   uses: codecov/codecov-action@v3
    #   if: always()
  
  # CDK validation job - checks infrastructure code
  cdk-validate:
    name: Validate CDK Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20.x

    - name: Setup Bun
      uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461  # v2
      with:
        bun-version: "1.2.x"
        cache: true

    - name: Install dependencies
      run: |
        bun install --frozen-lockfile
        cd infra && bun install --frozen-lockfile

    - name: Install CDK CLI
      run: bun install -g aws-cdk@2

    - name: Build CDK TypeScript
      run: cd infra && bun run build

    - name: Synthesize CDK stacks
      run: |
        cd infra
        bunx cdk synth --all --no-lookups --context baseDomain=example.com
      env:
        # Dummy values for synthesis only - not for deployment
        CDK_DEFAULT_ACCOUNT: '123456789012'
        CDK_DEFAULT_REGION: 'us-east-1'

    # Show infrastructure changes on PRs
    - name: CDK Diff
      if: github.event_name == 'pull_request'
      run: |
        cd infra
        echo "## Infrastructure Changes" >> $GITHUB_STEP_SUMMARY
        echo "```" >> $GITHUB_STEP_SUMMARY
        bunx cdk diff --context baseDomain=example.com 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
        echo "```" >> $GITHUB_STEP_SUMMARY
      env:
        CDK_DEFAULT_ACCOUNT: '123456789012'
        CDK_DEFAULT_REGION: 'us-east-1'